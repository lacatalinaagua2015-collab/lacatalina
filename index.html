  const [noVisitas, setNoVisitas] = useLS("cat_novisitas_v1",[]);
  const [pantalla, setPantalla] = React.useState("clientes");
  const [clienteId, setClienteId] = React.useState(null);

  const hoy = new Date().toISOString().slice(0,10);
  const fechaActual = hoy;
  const diaActual = repartidor.dia;

  const clientesDia = (clientes||[]).filter(c=>c.dia===diaActual).sort((a,b)=>(a.orden||9999)-(b.orden||9999));
  const cliente = clientesDia.find(c=>c.id===clienteId);

  const saveVentas = (nv) => {
    setVentas(nv);
    // sync a Firebase si está disponible
    try{ if(window.cloudSave) window.cloudSave({ventas:nv}); }catch(e){}
  };
  const saveNoVisitas = (nv) => {
    setNoVisitas(nv);
  };

  const irA = (p) => setPantalla(p);

  const prodKey = {"Bidón 10L":"b10","Bidón 20L":"b20","Sifón 1.5L":"soda"};

  // Avanzar al siguiente cliente
  const siguienteCliente = (nv, currentId) => {
    const ventasIds = new Set(ventas.filter(v=>v.fechaKey===fechaActual&&v.dia===diaActual&&!v._esCobro&&!v._esAjuste).map(v=>v.clienteId));
    const noVMap={}; (nv||noVisitas).filter(v=>v.dia===diaActual&&v.fecha===fechaActual).forEach(v=>{noVMap[v.clienteId]=v.motivo;});
    const terminados=new Set(clientesDia.filter(c=>ventasIds.has(c.id)||noVMap[c.id]==="noquiso"||noVMap[c.id]==="noesta2").map(c=>c.id));
    const normalPend=clientesDia.filter(c=>!terminados.has(c.id)&&noVMap[c.id]!=="noesta"&&c.id!==currentId);
    const noestaPend=clientesDia.filter(c=>noVMap[c.id]==="noesta"&&!terminados.has(c.id)&&c.id!==currentId);
    const sig=normalPend[0]||noestaPend[0];
    if(sig){setClienteId(sig.id);irA("detalleCliente");}else irA("clientes");
  };

  return (
    <div style={s.screen}>
      {pantalla==="clientes" && (
        <div>
          <div style={{...s.header,justifyContent:"space-between"}}>
            <span style={s.headerTitle}>👤 {repartidor.nombre} · {diaActual}</span>
            <button style={{...s.btn,fontSize:11,padding:"4px 10px",background:"rgba(220,38,38,0.15)",color:"var(--color-text-danger)"}} onClick={onSalir}>Salir</button>
          </div>
          <ListaClientes
            dia={diaActual} fecha={fechaActual} clientes={clientesDia} ventas={ventas} noVisitas={noVisitas}
            onCliente={id=>{setClienteId(id);irA("detalleCliente");}}
            onNuevoCliente={null}
            onVolver={null}
          />
        </div>
      )}
      {pantalla==="detalleCliente" && cliente && (
        <DetalleCliente
          cliente={cliente} ventas={ventas.filter(v=>v.clienteId===cliente.id)} noVisitas={noVisitas}
          dia={diaActual} fecha={fechaActual} productos={productos}
          onVolver={()=>irA("clientes")}
          onVenta={()=>{setClienteId(cliente.id);irA("venta");}}
          onEditar={null} onEliminarVenta={null} onEditarVenta={null} onEliminarCliente={null}
          onNoEstaCliente={()=>{
            const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo:"noesta"}];
            saveNoVisitas(nv); siguienteCliente(nv, cliente.id);
          }}
          onNoQuiereCliente={()=>{
            const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo:"noquiso"}];
            saveNoVisitas(nv); siguienteCliente(nv, cliente.id);
          }}
          recordatorios={[]} onGuardarRecordatorio={null} onConfirmarRecordatorio={null}
          onCobrarSaldo={null} onGuardarAjuste={null}
        />
      )}
      {pantalla==="venta" && cliente && (
        <NuevaVenta cliente={cliente} productos={productos} fecha={fechaActual}
          onNoEsta={()=>{
            const prev=(noVisitas||[]).find(v=>v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual);
            const motivo=prev?.motivo==="noesta"?"noesta2":"noesta";
            const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo}];
            saveNoVisitas(nv); siguienteCliente(nv, cliente.id);
          }}
          onNoQuiere={()=>{
            const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo:"noquiso"}];
            saveNoVisitas(nv); siguienteCliente(nv, cliente.id);
          }}
          onGuardar={(venta)=>{
            const nv=[...ventas,{...venta,id:Date.now(),clienteId:cliente.id,dia:diaActual,fechaKey:fechaActual,repartidorId:repartidor.id,repartidorNombre:repartidor.nombre}];
            saveVentas(nv); siguienteCliente(noVisitas, cliente.id);
          }}
          onVolver={()=>irA("detalleCliente")}
          ventaHoy={ventas.find(v=>v.clienteId===cliente.id&&v.fechaKey===fechaActual)}
          saldoCliente={cliente.saldo||0}
        />
      )}
    </div>
  );
}

function AppConLicenciaMulti() {
  const [acceso, setAcceso] = React.useState(()=>{
    const lic = localStorage.getItem("sm_codigo");
    const pin = localStorage.getItem("sm_pin");
    const repCod = localStorage.getItem("sm_rep_codigo");
    if(repCod) return "repartidor";
    if(!lic) return "activacion";
    if(!pin) return "activacion";
    return "pin";
  });
  const [pinActual, setPinActual] = React.useState(()=>localStorage.getItem("sm_pin"));
  const [repartidorActual, setRepartidorActual] = React.useState(()=>{
    try{return JSON.parse(localStorage.getItem("sm_rep_data")||"null");}catch{return null;}
  });

  // Verificar si el código ingresado es de un repartidor
  const verificarCodigoRepartidor = (codigo) => {
    try {
      const repartidores = JSON.parse(localStorage.getItem("cat_repartidores_v1")||"[]");
      return repartidores.find(r=>r.codigo===codigo.toUpperCase());
    } catch { return null; }
  };

  if(acceso === "activacion") return (
    <PantallaActivacionMulti onActivado={(pin)=>{ setPinActual(pin); setAcceso("pin"); }} onRepartidor={(rep)=>{
      localStorage.setItem("sm_rep_codigo", rep.codigo);
      localStorage.setItem("sm_rep_data", JSON.stringify(rep));
      setRepartidorActual(rep);
      setAcceso("repartidor");
    }} verificarRepartidor={verificarCodigoRepartidor} />
  );
  if(acceso === "pin") return <PantallaPINMulti pinCorrecto={pinActual} onOk={()=>setAcceso("app")}/>;
  if(acceso === "repartidor") return <AppRepartidor repartidor={repartidorActual} onSalir={()=>{
    localStorage.removeItem("sm_rep_codigo");
    localStorage.removeItem("sm_rep_data");
    setRepartidorActual(null);
    setAcceso("activacion");
  }}/>;
  return <ErrorBoundary><App/></ErrorBoundary>;
}
// ============ FIN SISTEMA DE LICENCIAS ============

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppConLicenciaMulti />);
</script>
</body>
</html>
