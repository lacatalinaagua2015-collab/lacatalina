  <title>Sistema de Reparto 2026</title>
  <script>
    if('serviceWorker' in navigator){
      const CACHE = 'lc-v51';
      const ASSETS = [
        'https://unpkg.com/react@18/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone/babel.min.js',
        'https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js',
        'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
      ];
      const sw = `
const CACHE='${CACHE}';
const ASSETS=${JSON.stringify(ASSETS)};
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net = fetch(e.request).then(res=>{
        if(res.ok) caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
        return res;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});`;
      const blob = new Blob([sw],{type:'application/javascript'});
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }
  </script>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyB8BB_xFyXCobGHoMj_dFOTA1n76FROfS4",
      authDomain: "emma-soluciones.firebaseapp.com",
      projectId: "emma-soluciones",
      storageBucket: "emma-soluciones.firebasestorage.app",
      messagingSenderId: "611618583352",
      appId: "1:611618583352:web:90f0f3a0248bc016c087cd"
    };
    try {
      if(!firebase.apps || !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      window.db = firebase.firestore();

      // Firebase secundario: Emma Control (para enviar datos de integración)
      var ecConfig = {
        apiKey: "AIzaSyBbLoljOPJgjNvVN7bfOuMl8NrUjFB-agU",
        authDomain: "emma-control.firebaseapp.com",
        projectId: "emma-control",
      };
      try {
        var ecApp = firebase.apps.find(a=>a.name==='emma-control') || firebase.initializeApp(ecConfig,'emma-control');
        window.dbEC = firebase.firestore(ecApp);
      } catch(e){ console.log('EC init:',e); }

      // Función para enviar datos del día a Emma Control
      window.enviarAEmmaControl = function(token, fecha, ingresos, gastos){
        if(!token || !window.dbEC) return;
        var ref = window.dbEC.collection('integraciones').doc(token).collection('movs');
        var batch = window.dbEC.batch();
        // Ingreso del día
        if(ingresos.total > 0){
          var ingId = 'lc_ing_' + fecha.replace(/-/g,'');
          batch.set(ref.doc(ingId), {
            id: ingId,
            tipo: 'ingreso',
            ent: 'negocio',
            desc: 'Reparto del día — ' + fecha,
            monto: ingresos.total,
            efectivo: ingresos.efectivo,
            transferencia: ingresos.transferencia,
            cat: 'App de Reparto',
            fecha: fecha,
            metodo: 'efectivo',
            _origen: 'la_catalina',
            _ts: Date.now(),
          });
        }
        // Gastos del día
        (gastos||[]).forEach(function(g, i){
          if(!g.monto || g.monto <= 0) return;
          var gId = 'lc_gas_' + fecha.replace(/-/g,'') + '_' + i;
          batch.set(ref.doc(gId), {
            id: gId,
            tipo: 'gasto',
            ent: 'negocio',
            desc: g.desc || 'Gasto reparto',
            monto: g.monto,
            cat: g.cat || 'Otros',
            fecha: fecha,
            metodo: g.metodo || 'efectivo',
            _origen: 'la_catalina',
            _ts: Date.now(),
          });
        });
        batch.commit().then(function(){ console.log('✅ Datos enviados a Emma Control'); })
          .catch(function(e){ console.log('Error Emma Control:', e); });
      };
      window.db.enablePersistence({synchronizeTabs:false}).catch(function(err){
        if(err.code==="failed-precondition"||err.code==="unimplemented"){
          console.warn("Offline persistence not available:", err.code);
        }
      });
    } catch(e) { console.error("Firebase init error:", e); window.db = null; }

    function cloudSave(data) {
      if(!window.db) return Promise.resolve(false);
      var col = window.db.collection("lc2");
      var saves = [
        col.doc("config").set({
          planillas: data.planillas || {},
          stock: data.stock || {},
          productos: data.productos || [],
          noVisitas: data.noVisitas || [],
          cargasDia: data.cargasDia || {},
          recordatorios: data.recordatorios || [],
          prospectos: data.prospectos || [],
          mantVeh: data.mantVeh || [],
          histPrecios: data.histPrecios || [],
          zonasReparto: data.zonasReparto || {}
        })
      ];
      // clientes en chunks de 50
      var cl = data.clientes || [];
      var nc = Math.ceil(cl.length/50)||1;
      saves.push(col.doc("clientes_meta").set({n:nc,total:cl.length}));
      for(var i=0;i<nc;i++){
        saves.push(col.doc("cl_"+i).set({d:cl.slice(i*50,i*50+50)}));
      }
      // ventas en chunks de 80
      var vt = data.ventas || [];
      var nv = Math.ceil(vt.length/80)||1;
      saves.push(col.doc("ventas_meta").set({n:nv,total:vt.length}));
      for(var j=0;j<nv;j++){
        saves.push(col.doc("vt_"+j).set({d:vt.slice(j*80,j*80+80)}));
      }
      // prospectos
      var pr = data.prospectos || [];
      saves.push(col.doc("prospectos").set({d:pr}));
      return Promise.all(saves).then(function(){return true;}).catch(function(e){console.error("Save err",e);return false;});
    }

    function cloudLoad() {
      if(!window.db) return Promise.resolve(null);
      var col = window.db.collection("lc2");
      return Promise.all([
        col.doc("config").get(),
        col.doc("clientes_meta").get(),
        col.doc("ventas_meta").get(),
        col.doc("prospectos").get()
      ]).then(function(results) {
        var cfg = results[0]; var cMeta = results[1]; var vMeta = results[2]; var prDoc = results[3];
        if(!cfg.exists) return null;
        var data = cfg.data();
        if(!data.recordatorios) data.recordatorios = [];
        if(!data.prospectos) data.prospectos = [];
        if(!data.mantVeh) data.mantVeh = [];
        if(!data.zonasReparto) data.zonasReparto = {};
        if(!data.histPrecios) data.histPrecios = [];
        // load clientes
        var nc = cMeta.exists ? (cMeta.data().n||0) : 0;
        var vn = vMeta.exists ? (vMeta.data().n||0) : 0;
        var cFetches = [];
        for(var i=0;i<nc;i++) cFetches.push(col.doc("cl_"+i).get());
        var vFetches = [];
        for(var j=0;j<vn;j++) vFetches.push(col.doc("vt_"+j).get());
        return Promise.all(cFetches.concat(vFetches)).then(function(docs) {
          var cDocs = docs.slice(0,nc);
          var vDocs = docs.slice(nc);

let _saveTimer = null;
let _saveQueue = null;
function debounceSave(fn) {
  _saveQueue = fn;
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    const f = _saveQueue; _saveQueue = null; _saveTimer = null;
    if(f) f();
  }, 1200);
}
window.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden" && _saveQueue){
    const f=_saveQueue; _saveQueue=null;
    if(_saveTimer){clearTimeout(_saveTimer);_saveTimer=null;}
    f();
  }
});

function useLS(key, fallback) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }

  });
  const save = (v) => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  };
  return [val, save];
}

  const pagadoNum = pago==="fiado" ? 0 : (montoPagado!==""&&!isNaN(Number(montoPagado)) ? Number(montoPagado) : aPagar);
  const saldoDelta = pagadoNum - neto;
  const costo = detalle.reduce((a,d)=>{ const p=productos.find(x=>x.nombre===d.nombre); return a+(p?p.costo*d.cantidad:0); },0);
  return { bruto, desc, neto, aPagar, pagadoNum, saldoDelta, costo, ganancia:neto-costo };
}

// Comprime imagen a max 800px y calidad 0.75 antes de guardar
function comprimirFoto(file, maxW=800, quality=0.75) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

    ventasDia.forEach(v=>v.detalle.forEach(d=>{const k=prodKey[d.nombre];if(k)tots[k].vacios+=d.cantidad;}));
    const sodaCajones=Math.floor(tots.soda.vacios/CAJON_SODA)||0;
    const cobEfectivo=ventasDia.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
    const cobFiado=ventasDia.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
    const cobTransBruto=ventasDia.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
    const cobTransDesc=Math.round(cobTransBruto*0.025);
    const planillaKey=`${diaActual}_${fechaActual}`;
    const planillaActual=planillas[planillaKey]||planillaDiaVacia();
    // Solo auto-completar campos vacíos, nunca pisar lo que el usuario editó
    const nueva={
      ...planillaActual,
      fecha:planillaActual.fecha||fechaActual,
      efectivo:planillaActual.efectivo||(cobEfectivo>0?String(Math.round(cobEfectivo)):""),
      fiado:planillaActual.fiado||(cobFiado>0?String(Math.round(cobFiado)):""),
      retenciones:planillaActual.retenciones||(cobTransDesc>0?String(cobTransDesc):""),
      _autoGuardado:true,
    };
    // Solo guardar si cambió algo
    if(JSON.stringify(nueva)!==JSON.stringify(planillaActual)){
      savePlanilla(planillaKey, nueva);
    }
    // CIERRE AUTOMÁTICO DEL STOCK — se ejecuta una sola vez por día
    const camionCerradoKey = `lc_cam_${planillaKey}`;
    // Solo cerrar si hubo reparto real (al menos 1 venta O la planilla tiene productos cargados)
    const huboReparto = ventasDia.length > 0 || 
      (planillaActual.productos?.b10?.llenos > 0) || 
      (planillaActual.productos?.b20?.llenos > 0) || 
      (planillaActual.productos?.soda?.llenos > 0);
    if(planillaActual.iniciado && huboReparto && !localStorage.getItem(camionCerradoKey)) {
      localStorage.setItem(camionCerradoKey, "1");
      const prodMap = {"Bidón 10L":"b10","Bidón 20L":"b20","Sifón 1.5L":"soda"};
      // Cuánto salió en el camión (según planilla de inicio de reparto)
      const llenos = {
        b10: Number(planillaActual.productos?.b10?.llenos||0),
        b20: Number(planillaActual.productos?.b20?.llenos||0),
        soda: Number(planillaActual.productos?.soda?.llenos||0),
      };
      // Cuánto se vendió (cada venta = 1 vacío que vuelve en el intercambio)
      const vendidos = {b10:0,b20:0,soda:0};
      ventasDia.forEach(v=>v.detalle.forEach(d=>{const k=prodMap[d.nombre];if(k)vendidos[k]+=d.cantidad;}));
      // Préstamos (sin recibir vacío) y devoluciones de deudas anteriores
      const prestados = {b10:0,b20:0,soda:0};
      const devueltos = {b10:0,b20:0,soda:0};
      ventasDia.forEach(v=>{
        (v.envPrest||[]).forEach(e=>{const k=prodMap[e.prod];if(k)prestados[k]+=Number(e.cant)||0;});
        (v.envDev||[]).forEach(e=>{const k=prodMap[e.prod];if(k)devueltos[k]+=Number(e.cant)||0;});
      });
      setStock(prev=>{
        const s=JSON.parse(JSON.stringify(normStock(prev)));
        ["b10","b20","soda"].forEach(pk=>{
          const sk=pk==="b10"?"bidon10":pk==="b20"?"bidon20":"sifon";
          const sorb=Math.max(0, llenos[pk]-vendidos[pk]-prestados[pk]); // sobrantes llenos en camión
          const vacios=vendidos[pk]+devueltos[pk]; // vacíos que vuelven (vendidos + devoluciones)
          s.soderia[sk]=(s.soderia[sk]||0)+sorb+vacios; // todo vuelve a sodería
          s.camion[sk]=Math.max(0,(s.camion[sk]||0)-sorb-vacios); // camión queda en 0
          s.casa[sk]=Math.max(0,(s.casa[sk]||0)-Math.max(0,prestados[pk])); // préstamos salen del depósito
        });
        syncData({stock:normStock(s)});
        return normStock(s);
      });

      // ── Enviar datos del día a Emma Control ──
      if(ecToken && window.enviarAEmmaControl){
        const cobEf=ventasDia.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
        const cobTr=ventasDia.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
        const totalCob=Math.round(cobEf+cobTr);
        const gastosData=(planillaActual.gastos||[]).filter(g=>g.monto&&Number(g.monto)>0).map(g=>({
          desc:g.desc||'Gasto reparto',
          monto:Number(g.monto),
          cat:g.cat||'Otros',
          metodo:g.metodo||'efectivo',
        }));
        window.enviarAEmmaControl(ecToken, fechaActual, {total:totalCob,efectivo:Math.round(cobEf),transferencia:Math.round(cobTr)}, gastosData);
      }
    }
  }, [ventas, noVisitas, clientes, diaActual, fechaActual, planillas, ecToken]);

  if (!apiKey || !binId) {
    return <SetupNube onSetup={(key,id)=>{ setApiKey(key); setBinId(id); setSyncStatus("saved"); }} />;
  }

  const registrarVenta = (detalle, pago, montoPagado, saldoAplicado, envPrest, envDev, obs, opcionSaldo, montoTrans2, saldoDeltaMixto) => {
    const c = cliente;
    // Auto-detectar envases prestados (solo si no es cobro de deuda)
    const envAutoDetect = [];
    if(opcionSaldo!=="cobro_deuda") {
      const mapa = {sifon:"Sifón 1.5L", bidon10:"Bidón 10L", bidon20:"Bidón 20L"};
      detalle.forEach(d=>{
        const asignado = d.nombre==="Sifón 1.5L"?(c.sifon||0):d.nombre==="Bidón 10L"?(c.bidon10||0):d.nombre==="Bidón 20L"?(c.bidon20||0):0;
        const extra = d.cantidad - asignado;
        if(extra>0) envAutoDetect.push({prod:d.nombre, cant:String(extra)});
      });
    }
    const envPrestFinal = [...(envPrest||[]).filter(e=>e.prod&&e.cant), ...envAutoDetect.filter(e=>!(envPrest||[]).some(ep=>ep.prod===e.prod))];

    // Pago mixto: guardamos pago real según opción
    const pagoReal = opcionSaldo==="mixto_ef"?"contado":opcionSaldo==="mixto_tr"?"transferencia":pago;
    const obsExtra = montoTrans2>0?` [Mixto: ef $${montoPagado} + tr $${montoTrans2}]`:"";

    const calc = calcVenta(detalle, pagoReal, montoPagado, saldoAplicado, productos);
    const nuevaVenta = {
      id:Date.now(), clienteId:c.id, cliente:c.nombre,
      dia:diaActual, fechaKey:fechaActual, fecha:new Date().toLocaleString("es-AR"),
      detalle, pago:pagoReal, obs:(obs||"")+obsExtra, saldoAplicado:saldoAplicado||0,
      envPrest:envPrestFinal,
      envDev:(envDev||[]).filter(e=>e.prod&&e.cant), ...calc,
      montoTrans:montoTrans2||0, montoEfec:opcionSaldo==="mixto_ef"?Number(montoPagado):0,
    };

    // Si es pago mixto, también guardamos la parte de transferencia como venta separada
    let nuevasVentas = [...ventas, nuevaVenta];
    let saldoExtra = calc.saldoDelta;
    if(montoTrans2>0 && opcionSaldo==="mixto_ef") {
      // Registrar transferencia como venta separada vinculada
      const nTr = nuevaVenta.neto; // mismo neto para no duplicar
      const ventaTr = {
        id:Date.now()+2, clienteId:c.id, cliente:c.nombre,
        dia:diaActual, fechaKey:fechaActual, fecha:new Date().toLocaleString("es-AR"),
        detalle:[{nombre:"Pago mixto · transferencia",cantidad:1,precio:montoTrans2,total:montoTrans2}],
        pago:"transferencia", obs:"[Parte transfer. de pago mixto]", saldoAplicado:0,
        neto:montoTrans2, bruto:montoTrans2, desc:0, costo:0, ganancia:montoTrans2,
        pagadoNum:montoTrans2, saldoDelta:montoTrans2, // suma al saldo del cliente
        envPrest:[], envDev:[],
      };
      nuevasVentas = [...nuevasVentas, ventaTr];
      saldoExtra += montoTrans2; // la transferencia abona al saldo
    }

    saveVentas(nuevasVentas);
    const nuevosClientes = clientes.map(c2=>c2.id===c.id?{...c2,saldo:c.saldo+saldoExtra}:c2);
    saveClientes(nuevosClientes);
  };


  const renumerarTrasEliminar = (lista, clienteEliminado) => {
    const { dia, orden } = clienteEliminado;
    if(!orden) return lista;
    return lista.map(c =>
      c.dia === dia && (c.orden||0) > orden
        ? {...c, orden: c.orden - 1}
        : c
    );
  };
  const eliminarCliente = (clienteId) => {
    const eliminado = clientes.find(c=>c.id===clienteId);
    let nc = clientes.filter(c=>c.id!==clienteId);
    if(eliminado) nc = renumerarTrasEliminar(nc, eliminado);
    saveClientes(nc);
    const nv = ventas.filter(v=>v.clienteId!==clienteId);
    saveVentas(nv);
    irA("clientes");
  };

  const eliminarVenta = (ventaId) => {
    const v = ventas.find(x=>x.id===ventaId); if(!v) return;
    const nv = ventas.filter(x=>x.id!==ventaId);
    saveVentas(nv);
    const c = clientes.find(x=>x.id===v.clienteId);
    if(c){ const nc=clientes.map(x=>x.id===c.id?{...x,saldo:c.saldo-v.saldoDelta}:x); saveClientes(nc); }
  };

  const editarVenta = (ventaId, detalle, pago, montoPagado, saldoAplicado, obs, montoTrans2) => {
    const vV = ventas.find(v=>v.id===ventaId); if(!vV) return;
    const c  = clientes.find(x=>x.id===vV.clienteId);
    const pagoReal = pago==="mixto"?"contado":pago;
    const calc = calcVenta(detalle, pagoReal, montoPagado, saldoAplicado, productos);
    // Remove old transfer venta if existed (from previous mixto edit)
    let nev = ventas.filter(v=>!(v.obs==="[Parte transfer. de pago mixto]"&&v.clienteId===vV.clienteId&&v.fechaKey===vV.fechaKey));
    nev = nev.map(v=>v.id===ventaId?{...vV,detalle,pago:pagoReal,obs,saldoAplicado:saldoAplicado||0,...calc}:v);
    let saldoExtra = c ? (c.saldo - vV.saldoDelta + calc.saldoDelta) : 0;
    // If mixto, add transfer venta
    if(pago==="mixto"&&montoTrans2>0){
      const ventaTr = {
        id:Date.now()+2, clienteId:vV.clienteId, cliente:vV.cliente,
        dia:vV.dia, fechaKey:vV.fechaKey, fecha:vV.fecha,
        detalle:[{nombre:"Pago mixto · transferencia",cantidad:1,precio:montoTrans2,total:montoTrans2}],
        pago:"transferencia", obs:"[Parte transfer. de pago mixto]", saldoAplicado:0,
        neto:montoTrans2, bruto:montoTrans2, desc:0, costo:0, ganancia:montoTrans2,
        pagadoNum:montoTrans2, saldoDelta:montoTrans2, envPrest:[], envDev:[],
      };
      nev = [...nev, ventaTr];
      saldoExtra += montoTrans2;
    }
    saveVentas(nev);
    if(c){ const nc=clientes.map(x=>x.id===c.id?{...x,saldo:saldoExtra}:x); saveClientes(nc); }
  };

  return (
    <div style={{position:"relative"}}>
    <div style={{...s.app, zoom: SCALES[scaleIdx]}}>
      <SyncBar status={syncStatus} isOnline={isOnline} />
      {pantalla==="portada"        && <Portada onIngresar={()=>irA("menu")} />}
      {pantalla==="menu"           && <MenuDias dias={DIAS} onDia={d=>{setDiaActual(d);irA("diaPrincipal");}} onResumen={()=>irA("resumen")} onConfig={()=>irA("config")} onGestionClientes={()=>irA("gestionClientes")} onPromocion={()=>irA("promocion")} onStock={()=>irA("stock")} onVolver={()=>irA("portada")} darkMode={darkMode} onToggleDark={()=>setDarkMode(!darkMode)} clientes={clientes} ventas={ventas} stock={stockNorm}
          recordatoriosActivos={recordatoriosActivos}
          onConfirmarRecordatorio={(id)=>saveRecordatorios((recordatorios||[]).map(r=>r.id===id?{...r,confirmado:true}:r))}
          onVerConfirmaciones={(dia)=>{setDiaActual(dia);irA("confirmacionesDia");}}
          transferenciasPendientes={DIAS.map(dia=>{
            const vts = ventas.filter(v=>v.dia===dia&&v.pago==="transferencia"&&!v.transConfirmada);
            if(!vts.length) return null;
            const fechas = [...new Set(vts.map(v=>v.fechaKey))].sort().reverse();
            return {dia, fecha:fechas[0]||"", count:vts.length, monto:vts.reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0), ventas:vts};
          }).filter(Boolean)} zonasReparto={zonasReparto} onSetZona={(dia,zona)=>{const nz={...zonasReparto,[dia]:zona};setZonasReparto(nz);syncData({zonasReparto:nz});}} />}
      {pantalla==="confirmacionesDia" && <ConfirmacionesDia
          dia={diaActual}
          ventas={ventas.filter(v=>v.dia===diaActual&&v.pago==="transferencia")}
          clientes={clientes}
          onConfirmar={(ventaId)=>{const nv=ventas.map(v=>v.id===ventaId?{...v,transConfirmada:!v.transConfirmada}:v);saveVentas(nv);}}
          onVolver={()=>irA("menu")} />}
      {pantalla==="diaPrincipal"   && <DiaPrincipal dia={diaActual} onIrClientes={()=>irA("selectorFechaClientes")} onIrPlanilla={()=>irA("selectorFechaPlanilla")} onVolver={()=>irA("menu")} onVerConfirmaciones={()=>irA("confirmacionesDia")} ventasPendientesTransfer={ventas.filter(v=>v.dia===diaActual&&v.pago==="transferencia"&&!v.transConfirmada).length} />}
      {pantalla==="selectorFechaPlanilla" && <SelectorFecha dia={diaActual} planillas={planillas} ventas={ventas} noVisitas={noVisitas} onSeleccionar={(fk,fo)=>{setFechaActual(fk);setFechaObj(fo);irA("planilla");}} onVolver={()=>irA("diaPrincipal")} />}
      {pantalla==="planilla"       && <PlanillaDelDia dia={diaActual} fecha={fechaActual} ventas={ventas.filter(v=>v.dia===diaActual&&v.fechaKey===fechaActual)} clientes={clientes} planilla={planillas[`${diaActual}_${fechaActual}`]||planillaDiaVacia()} productos={productos} stock={stockNorm} setStock={setStock} syncData={syncData} onGuardar={d=>{savePlanilla(`${diaActual}_${fechaActual}`,d);irA("selectorFechaPlanilla");}} onVolver={()=>irA("selectorFechaPlanilla")} />}
      {pantalla==="selectorFechaClientes" && <SelectorFecha dia={diaActual} planillas={planillas} ventas={ventas} noVisitas={noVisitas} onSeleccionar={(fk,fo)=>{setFechaActual(fk);setFechaObj(fo);irA("inicioReparto");}} onVolver={()=>irA("diaPrincipal")} />}
      {pantalla==="inicioReparto"  && <InicioReparto dia={diaActual} fecha={fechaActual} planilla={planillas[`${diaActual}_${fechaActual}`]||planillaDiaVacia()} productos={productos} cargasDia={cargasDia} stock={stockNorm}
        onGuardar={(p,descontar)=>{
          savePlanilla(`${diaActual}_${fechaActual}`,p);
          if(descontar){
            const s=JSON.parse(JSON.stringify(normStock(stockNorm)));
            const soda=Number(p.productos?.soda?.llenos||0);
            const b10=Number(p.productos?.b10?.llenos||0);
            const b20=Number(p.productos?.b20?.llenos||0);
            s.soderia.sifon  =Math.max(0,(s.soderia.sifon||0)-soda);
            s.soderia.bidon10=Math.max(0,(s.soderia.bidon10||0)-b10);
            s.soderia.bidon20=Math.max(0,(s.soderia.bidon20||0)-b20);
            s.camion.sifon   =(s.camion.sifon||0)+soda;
            s.camion.bidon10 =(s.camion.bidon10||0)+b10;
            s.camion.bidon20 =(s.camion.bidon20||0)+b20;
            setStock(normStock(s));
            syncData({stock:normStock(s)});
          }
          irA("clientes");
        }} onVolver={()=>irA("selectorFechaClientes")} />}
      {pantalla==="clientes"       && <ListaClientes clientes={clientes.filter(c=>c.dia===diaActual)} dia={diaActual} fecha={fechaActual} ventas={ventas.filter(v=>v.fechaKey===fechaActual&&v.dia===diaActual)} ventasTodas={ventas} noVisitas={(noVisitas||[]).filter(v=>v.dia===diaActual&&v.fecha===fechaActual)} onSeleccionar={c=>{setClienteId(c.id);irA("detalleCliente");}} onNuevoCliente={()=>irA("nuevoCliente")} onVolver={()=>irA("selectorFechaClientes")} onReordenar={lista=>{
          const otros=clientes.filter(c=>c.dia!==diaActual);
          saveClientes([...otros,...lista]);
        }} onRegistrarNoVisita={(clienteId,motivo)=>{const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===clienteId&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId,dia:diaActual,fecha:fechaActual,motivo}];saveNoVisitas(nv);}} onQuitarNoVisita={(clienteId)=>{const nv=(noVisitas||[]).filter(v=>!(v.clienteId===clienteId&&v.dia===diaActual&&v.fecha===fechaActual));saveNoVisitas(nv);}}
        onConfirmarTransfer={(clienteId,ventaId)=>{
          const nv=ventas.map(v=>v.id===ventaId?{...v,transConfirmada:!v.transConfirmada}:v);
          saveVentas(nv);
        }}
        prospectos={(prospectos||[]).filter(p=>p.dia===diaActual&&p.estado==="activo")}
        recordatorios={recordatorios}
        onVentaProspecto={(p)=>{
          if(!clientes.find(c=>c.id===p.id)){
            saveClientes([...clientes,{...p,saldo:0,_esProspecto:true}]);
          }
          setClienteId(p.id);
          irA("venta");
        }}
        onNoEstaProspecto={(id)=>{
          const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:id,dia:diaActual,fecha:fechaActual,motivo:"noesta"}];
          saveNoVisitas(nv);
        }}
        />}
      {pantalla==="detalleCliente" && cliente && <DetalleCliente cliente={cliente} ventas={ventas.filter(v=>v.clienteId===cliente.id)} noVisitas={(noVisitas||[]).filter(v=>v.clienteId===cliente.id)} dia={diaActual} fecha={fechaActual} productos={productos} onVenta={()=>irA("venta")} onVolver={()=>irA("clientes")} onEditar={cambios=>updateCliente(cliente.id,cambios)} onEliminarVenta={eliminarVenta} onEditarVenta={editarVenta} onEliminarCliente={()=>eliminarCliente(cliente.id)}
          onNoEstaCliente={()=>{
            const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo:"noesta"}];
            saveNoVisitas(nv);
            const clientesDia=clientes.filter(c=>c.dia===diaActual).sort((a,b)=>(a.orden||9999)-(b.orden||9999));
            const ventasIds=new Set(ventas.filter(v=>v.fechaKey===fechaActual&&v.dia===diaActual&&!v._esCobro&&!v._esAjuste).map(v=>v.clienteId));
            const noVMap={};nv.filter(v=>v.dia===diaActual&&v.fecha===fechaActual).forEach(v=>{noVMap[v.clienteId]=v.motivo;});
            const terminados=new Set(clientesDia.filter(c=>ventasIds.has(c.id)||noVMap[c.id]==="noquiso"||noVMap[c.id]==="noesta2").map(c=>c.id));
            const normalPend=clientesDia.filter(c=>!terminados.has(c.id)&&noVMap[c.id]!=="noesta"&&c.id!==cliente.id);
            const noestaPend=clientesDia.filter(c=>noVMap[c.id]==="noesta"&&!terminados.has(c.id)&&c.id!==cliente.id);
            const sig=normalPend[0]||noestaPend[0];
            if(sig){setClienteId(sig.id);irA("detalleCliente");}else irA("clientes");
          }}
          onNoQuiereCliente={()=>{
            const nv=[...(noVisitas||[]).filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo:"noquiso"}];
            saveNoVisitas(nv);
            const clientesDia=clientes.filter(c=>c.dia===diaActual).sort((a,b)=>(a.orden||9999)-(b.orden||9999));
            const ventasIds=new Set(ventas.filter(v=>v.fechaKey===fechaActual&&v.dia===diaActual&&!v._esCobro&&!v._esAjuste).map(v=>v.clienteId));
            const noVMap={};nv.filter(v=>v.dia===diaActual&&v.fecha===fechaActual).forEach(v=>{noVMap[v.clienteId]=v.motivo;});
            const terminados=new Set(clientesDia.filter(c=>ventasIds.has(c.id)||noVMap[c.id]==="noquiso"||noVMap[c.id]==="noesta2").map(c=>c.id));
            const normalPend=clientesDia.filter(c=>!terminados.has(c.id)&&noVMap[c.id]!=="noesta"&&c.id!==cliente.id);
            const noestaPend=clientesDia.filter(c=>noVMap[c.id]==="noesta"&&!terminados.has(c.id)&&c.id!==cliente.id);
            const sig=normalPend[0]||noestaPend[0];
            if(sig){setClienteId(sig.id);irA("detalleCliente");}else irA("clientes");
          }}
          recordatorios={recordatorios}
          onGuardarRecordatorio={(r)=>saveRecordatorios([...(recordatorios||[]),r])}
          onConfirmarRecordatorio={(id)=>saveRecordatorios((recordatorios||[]).map(r=>r.id===id?{...r,confirmado:true}:r))}
          onCobrarSaldo={(monto,pago)=>{
            const cl=cliente;
            const saldoAntes=cl.saldo||0;
            const saldoDespues=saldoAntes+monto;
            const det=[{nombre:"Cobro de deuda",cantidad:1,precio:0,total:0}];
            const vt={id:Date.now(),clienteId:cl.id,cliente:cl.nombre,dia:diaActual,fechaKey:fechaActual,fecha:new Date().toLocaleString("es-AR"),
              detalle:det,pago,obs:`Cobro de deuda $${monto.toLocaleString("es-AR")} (${pago})`,saldoAplicado:0,
              neto:0,bruto:0,desc:0,costo:0,ganancia:0,pagadoNum:monto,saldoDelta:monto,envPrest:[],envDev:[],
              saldoAntes,saldoDespues,_esCobro:true};
            saveVentas([...ventas,vt]);
            saveClientes(clientes.map(x=>x.id===cl.id?{...x,saldo:saldoDespues}:x));
          }}
          onGuardarAjuste={(vt)=>{saveVentas([...ventas,vt]);}} />}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null}; }

  render() {
    if(this.state.error) return (
      <div style={{padding:40,textAlign:"center",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0f1923"}}>

        <button style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,cursor:"pointer"}}

// ── Generador de fechas por día de semana ────────────────────────────────────
function getFechasDelAnio(diaNombre) {
  const diasSemana = {"Lunes":1,"Martes":2,"Miércoles":3,"Jueves":4,"Viernes":5,"Sábado":6,"Domingo":0};
  const target = diasSemana[diaNombre];
  if(target===undefined) return [];
  const hoy = new Date();
  const anio = hoy.getFullYear();
  const fechas = [];
  const d = new Date(anio,0,1);
  while(d.getDay()!==target) d.setDate(d.getDate()+1);
  while(d.getFullYear()===anio) {
    fechas.push(new Date(d));
    d.setDate(d.getDate()+7);
  }
  return fechas;
}

function formatFecha(d) {
  return d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
}

function fechaKey(d) {
  return d.toISOString().slice(0,10);
}

function hoyKey() { return new Date().toISOString().slice(0,10); }

function SelectorFecha({dia,planillas,ventas,noVisitas,onSeleccionar,onVolver}) {
  const fechas = getFechasDelAnio(dia);
  const hoy = hoyKey();
  const [mostrarTodas,setMostrarTodas] = useState(false);

  // Agrupar por mes
  const porMes = {};
  fechas.forEach(f=>{
    const mes = f.toLocaleDateString("es-AR",{month:"long",year:"numeric"});
    if(!porMes[mes]) porMes[mes]=[];
    porMes[mes].push(f);
  });

  const meses = Object.keys(porMes);
  const mesActual = new Date().toLocaleDateString("es-AR",{month:"long",year:"numeric"});
  const [mesAbierto,setMesAbierto] = useState(mesActual);

  const ventasPorFecha = {};
  ventas.filter(v=>v.dia===dia).forEach(v=>{
    const fk = v.fechaKey || v.fecha?.slice(0,10) || "";
    ventasPorFecha[fk] = (ventasPorFecha[fk]||0) + 1;
  });

  const visitasPorFecha = {};
  (noVisitas||[]).filter(v=>v.dia===dia).forEach(v=>{
    visitasPorFecha[v.fecha] = (visitasPorFecha[v.fecha]||0) + 1;
  });

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Fechas de visita · {dia}</span>
      </div>
      <div style={{padding:"8px 16px"}}>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:8}}>Seleccioná la fecha de reparto para comenzar o continuar la jornada.</p>
        {meses.map(mes=>{
          const abierto = mes===mesAbierto;
          return (
            <div key={mes} style={{marginBottom:8}}>
              <button style={{...s.card,margin:0,width:"100%",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:abierto?"var(--color-background-info)":"var(--color-background-secondary)"}}
                onClick={()=>setMesAbierto(abierto?null:mes)}>
                <span style={{fontSize:14,fontWeight:500,color:abierto?"var(--color-text-info)":"var(--color-text-primary)",textTransform:"capitalize"}}>{mes}</span>
                <span style={{color:"var(--color-text-tertiary)"}}>{abierto?"▲":"▼"}</span>
              </button>
              {abierto&&(
                <div style={{border:"0.5px solid var(--color-border-tertiary)",borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
                  {porMes[mes].map(f=>{
                    const fk = fechaKey(f);
                    const planKey = `${dia}_${fk}`;
                    const tienePlanilla = !!planillas[planKey];
                    const nVentas = ventasPorFecha[fk]||0;
                    const nVisitas = visitasPorFecha[fk]||0;
                    const esHoy = fk===hoy;
                    return (
                      <button key={fk} style={{width:"100%",textAlign:"left",padding:"12px 16px",cursor:"pointer",border:"none",borderBottom:"0.5px solid var(--color-border-tertiary)",background:esHoy?"var(--color-background-success)":"var(--color-background-primary)",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                        onClick={()=>onSeleccionar(fk,f)}>
                        <div>
                          <span style={{fontSize:14,fontWeight:esHoy?500:400,color:esHoy?"var(--color-text-success)":"var(--color-text-primary)",textTransform:"capitalize"}}>
                            {formatFecha(f)}{esHoy?" · Hoy":""}
                          </span>
                          <div style={{display:"flex",gap:6,marginTop:4}}>
                            {nVentas>0&&<span style={s.badge("success")}>{nVentas} entregas</span>}
                            {nVisitas>0&&<span style={s.badge("warning")}>{nVisitas} visitas s/venta</span>}
                            {tienePlanilla&&<span style={s.badge("info")}>planilla ✓</span>}
                          </div>
                        </div>
                        <span style={{color:"var(--color-text-tertiary)"}}>→</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        {/* Fecha especial al final */}
        <div style={{...s.card,margin:"12px 0 0",background:"var(--color-background-tertiary)"}}>
          <label style={s.label}>📅 Fecha especial (feriado o reparto extra)</label>
          <input type="date" style={{...s.input,fontSize:14,marginTop:4}}
            onChange={e=>{
              if(e.target.value){
                const d=new Date(e.target.value+'T12:00:00');
                onSeleccionar(e.target.value,d);
              }
            }}
          />
        </div>
      </div>
    </div>
  );
}

          <div style={{width:24,height:24,borderRadius:"50%",background:"#185FA5",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,flexShrink:0}}>3</div>
          <div style={{fontSize:14,color:"var(--color-text-primary)"}}>
            <span style={{fontWeight:500}}>Copiá tu API Key</span>
            <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2,lineHeight:1.6}}>
              Una vez adentro andá a <b>API Keys</b> en el menú → <b>+ Create Access Key</b> → nombrarla <b>reparto-app</b> → copiá la clave larga que aparece
            </div>
          </div>
        </div>
      </div>

      <div>
        <label style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:6,display:"block"}}>Pegá tu API Key acá</label>
        <textarea
          style={{width:"100%",padding:"10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:8,fontSize:13,background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none",minHeight:70,resize:"none",boxSizing:"border-box",lineHeight:1.5}}
          placeholder="$2b$10$xxxxxxxxxxxxxxxxxx..."
          value={apiKey}
          onChange={e=>setApiKey(e.target.value)}
        />
        {error && <div style={{fontSize:13,color:"var(--color-text-danger)",marginTop:6}}>{error}</div>}
      </div>

      <button
        style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"14px",fontSize:15,fontWeight:500,cursor:"pointer",opacity:cargando?0.7:1}}
        onClick={conectar}
        disabled={cargando}
      >
        {cargando ? "Conectando..." : "Conectar y comenzar"}
      </button>

      <p style={{fontSize:12,color:"var(--color-text-tertiary)",textAlign:"center",lineHeight:1.6}}>
        Tus datos se guardan en tu cuenta privada de JSONBin. Es gratis y seguro. Solo vos tenés acceso.
      </p>
    </div>
  );
}

function StockGeneral({stock,setStock,clientes,ventas,productos,planillas,onVolver,onAjustarEnvases}) {
  const CAJON = 6;
  const [tab, setTab] = React.useState("inv");
  const [guardado, setGuardado] = React.useState(false);
  const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
  const prodKey = {"Sifón 1.5L":"sifon","Bidón 10L":"bidon10","Bidón 20L":"bidon20"};

  // Stock base editable (sodería y depósito)
  const [base, setBase] = React.useState(()=>({
    soderia:        {...(stock?.soderia        ||{sifon:0,bidon10:0,bidon20:0})},
    soderia_vacios: {...(stock?.soderia_vacios ||{sifon:0,bidon10:0,bidon20:0})},
    casa:           {...(stock?.casa           ||{sifon:0,bidon10:0,bidon20:0})},
  }));
  const setB = (lugar,key,val) => setBase(b=>({...b,[lugar]:{...b[lugar],[key]:Number(val)||0}}));

  // Hoy
  const hoy = new Date().toISOString().slice(0,10);

  // ¿El día ya fue cerrado?
  const diaCerradoHoy = DIAS.some(d=>!!planillas[`${d}_${hoy}`]?._diaCerrado);

  // Lo cargado hoy en el camión (desde planillas)
  const cargadoHoy = {sifon:0,bidon10:0,bidon20:0};
  DIAS.forEach(d=>{
    const p = planillas[`${d}_${hoy}`];
    if(p?.productos){
      cargadoHoy.sifon   += Number(p.productos.soda?.llenos||0);
      cargadoHoy.bidon10 += Number(p.productos.b10?.llenos||0);
      cargadoHoy.bidon20 += Number(p.productos.b20?.llenos||0);
    }
  });
  const hayRepartHoy = cargadoHoy.sifon>0||cargadoHoy.bidon10>0||cargadoHoy.bidon20>0;

  // Lo vendido hoy
  const ventasHoy = ventas.filter(v=>v.fechaKey===hoy);
  const vendidoHoy = {sifon:0,bidon10:0,bidon20:0};
  ventasHoy.forEach(v=>v.detalle.forEach(d=>{
    const k=prodKey[d.nombre]; if(k) vendidoHoy[k]+=d.cantidad;
  }));

  // Devuelto hoy (vacíos recibidos)
  const devueltoHoy = {sifon:0,bidon10:0,bidon20:0};
  ventasHoy.forEach(v=>{
    (v.envDev||[]).forEach(e=>{
      const k = e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;
      if(k) devueltoHoy[k]+=Number(e.cant)||0;
    });
  });

  // En camión: valor real de Firebase (actualizado por InicioReparto/cerrarCamion)
  const enCamion = diaCerradoHoy ? {sifon:0,bidon10:0,bidon20:0} : {
    sifon:   stock?.camion?.sifon   || 0,
    bidon10: stock?.camion?.bidon10 || 0,
    bidon20: stock?.camion?.bidon20 || 0,
  };

  // Calcular envases prestados EXTRA por cliente (suma histórica de préstamos - devoluciones)
  const calcPrestados = (clienteId) => {
    const ex = {sifon:0,bidon10:0,bidon20:0};
    ventas.filter(v=>v.clienteId===clienteId).forEach(v=>{
      (v.envPrest||[]).forEach(e=>{
        const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;
        if(k) ex[k]+=Number(e.cant)||0;
      });
      (v.envDev||[]).forEach(e=>{
        const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;
        if(k) ex[k]-=Number(e.cant)||0;
      });
    });
    return {sifon:Math.max(0,ex.sifon),bidon10:Math.max(0,ex.bidon10),bidon20:Math.max(0,ex.bidon20)};
  };

  // Total prestados extra en todos los clientes
  const totalPrestados = {sifon:0,bidon10:0,bidon20:0};
  const clientesConPrestados = clientes.filter(c=>{
    const ex=calcPrestados(c.id);
    if(ex.sifon>0||ex.bidon10>0||ex.bidon20>0) {
      totalPrestados.sifon+=ex.sifon;
      totalPrestados.bidon10+=ex.bidon10;
      totalPrestados.bidon20+=ex.bidon20;
      return true;
    }
    return false;
  });

  const guardar = () => {
    setStock({soderia:base.soderia,soderia_vacios:base.soderia_vacios,casa:base.casa,camion:stock?.camion||{sifon:0,bidon10:0,bidon20:0}});
    setGuardado(true);
    setTimeout(()=>setGuardado(false),2000);
  };

  const StatBox = ({label,val,sub,color}) => (
    <div style={{flex:1,background:"var(--color-background-tertiary)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
      <div style={{fontSize:22,fontWeight:700,color:color||"var(--color-text-primary)"}}>{val}</div>
      {sub&&<div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>{sub}</div>}
      <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>{label}</div>
    </div>
  );

  const InputStock = ({lugar,label,field,isCajon}) => {
    const val = isCajon ? Math.floor((base[lugar]?.[field]||0)/CAJON) : (base[lugar]?.[field]||0);
    return (
      <div>
        <label style={{...s.label,textAlign:"center",fontSize:11}}>{label}</label>
        <input style={{...s.inputNum,textAlign:"center"}} type="number" min={0} value={val}
          onChange={e=>{
            const v=Number(e.target.value)||0;
            if(isCajon){const sueltos=(base[lugar]?.[field]||0)%CAJON;setB(lugar,field,v*CAJON+sueltos);}
            else setB(lugar,field,v);
          }}/>
        {isCajon&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",textAlign:"center",marginTop:2}}>{base[lugar]?.[field]||0} sifones</div>}
      </div>
    );
  };

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>📦 Stock</span>
      </div>

      {/* TABS */}
      <div style={{display:"flex",gap:6,padding:"10px 14px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
        {[["inv","📦 Inventario"],["clientes","👥 Clientes"]].map(([t,l])=>(
          <button key={t} style={{...s.btn,flex:1,padding:"8px 4px",fontSize:13,fontWeight:tab===t?600:400,
            background:tab===t?"var(--color-background-secondary)":"transparent",
            borderBottom:tab===t?"2px solid #185FA5":"none",borderRadius:tab===t?"8px 8px 0 0":"8px",
            color:tab===t?"var(--color-text-primary)":"var(--color-text-secondary)"}}
            onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      <div style={{padding:14,overflowY:"auto"}}>

      {/* ══ TAB INVENTARIO ══ */}
      {tab==="inv"&&(<>

        {/* SECCIÓN 1 — Sodería */}
        <div style={{...s.card,margin:"0 0 12px",borderLeft:"3px solid #1D9E75"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1D9E75",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>🏭 Sodería — Stock disponible</div>
          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:6}}>Llenos listos para salir</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <StatBox label="Cajones soda" val={Math.floor((base.soderia.sifon||0)/CAJON)} sub={`${base.soderia.sifon||0} sif`} color="#e2ecff"/>
            <StatBox label="Bidón 10L" val={base.soderia.bidon10||0} color="#e2ecff"/>
            <StatBox label="Bidón 20L" val={base.soderia.bidon20||0} color="#e2ecff"/>
          </div>
          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:6}}>Vacíos en sodería</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <StatBox label="Cajones soda" val={Math.floor((base.soderia_vacios.sifon||0)/CAJON)} sub={`${base.soderia_vacios.sifon||0} sif`} color="#f5b942"/>
            <StatBox label="Bidón 10L" val={base.soderia_vacios.bidon10||0} color="#f5b942"/>
            <StatBox label="Bidón 20L" val={base.soderia_vacios.bidon20||0} color="#f5b942"/>
          </div>
          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:8}}>Ajustar llenos:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
            <InputStock lugar="soderia" label="Cajones soda" field="sifon" isCajon={true}/>
            <InputStock lugar="soderia" label="Bidón 10L" field="bidon10"/>
            <InputStock lugar="soderia" label="Bidón 20L" field="bidon20"/>
          </div>
          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:8}}>Ajustar vacíos:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <InputStock lugar="soderia_vacios" label="Caj. soda vacíos" field="sifon" isCajon={true}/>
            <InputStock lugar="soderia_vacios" label="Bidón 10L vacíos" field="bidon10"/>
            <InputStock lugar="soderia_vacios" label="Bidón 20L vacíos" field="bidon20"/>
          </div>
        </div>

        {/* SECCIÓN 2 — Camión (solo si hay reparto hoy) */}
        {hayRepartHoy ? (
          <div style={{...s.card,margin:"0 0 12px",borderLeft:`3px solid ${diaCerradoHoy?"#1D9E75":"#185FA5"}`}}>
            <div style={{fontSize:12,fontWeight:700,color:diaCerradoHoy?"#1D9E75":"#185FA5",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>
              🚚 Camión — {diaCerradoHoy?"Día cerrado ✅":"En reparto ahora"}
            </div>
            {diaCerradoHoy ? (
              <div style={{fontSize:13,color:"#4dd9a0",textAlign:"center",padding:"8px 0"}}>
                ✅ El camión fue descargado — stock actualizado
              </div>
            ) : (
              <>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <StatBox label="Cajones" val={Math.floor(enCamion.sifon/CAJON)} color="#7ecfff"/>
                  <StatBox label="10L" val={enCamion.bidon10} color="#7ecfff"/>
                  <StatBox label="20L" val={enCamion.bidon20} color="#7ecfff"/>
                </div>
                <div style={{fontSize:11,color:"var(--color-text-tertiary)",borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:8}}>
                  Cargado: {Math.floor(cargadoHoy.sifon/CAJON)} caj · {cargadoHoy.bidon10} 10L · {cargadoHoy.bidon20} 20L
                  {"  |  "}Vendido: {Math.floor(vendidoHoy.sifon/CAJON)} caj · {vendidoHoy.bidon10} 10L · {vendidoHoy.bidon20} 20L
                </div>
              </>
            )}
          </div>
        ) : (
          <div style={{...s.card,margin:"0 0 12px",background:"rgba(24,95,165,0.05)",border:"0.5px dashed rgba(24,95,165,0.3)"}}>
            <div style={{fontSize:13,color:"var(--color-text-tertiary)",textAlign:"center",padding:"8px 0"}}>🚚 Sin reparto activo hoy</div>
            {(stock?.camion?.sifon>0||stock?.camion?.bidon10>0||stock?.camion?.bidon20>0)&&(
              <button style={{...s.btn,width:"100%",fontSize:12,padding:"6px",marginTop:6,color:"var(--color-text-danger)",border:"1px solid var(--color-text-danger)"}}
                onClick={()=>{if(window.confirm("¿Limpiar camión? Solo si no hay reparto activo.")){setStock(prev=>({...prev,camion:{sifon:0,bidon10:0,bidon20:0}}));}}}>
                🔄 Limpiar camión (datos acumulados)
              </button>
            )}
          </div>
        )}

        {/* SECCIÓN 3 — Clientes prestados */}
        <div style={{...s.card,margin:"0 0 12px",borderLeft:"3px solid rgba(245,158,11,0.7)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>👤 En clientes — Prestados extra</div>
          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:10}}>Envases que están en la calle sin devolver (además del consumo habitual)</div>
          {(totalPrestados.sifon+totalPrestados.bidon10+totalPrestados.bidon20)===0 ? (
            <div style={{fontSize:13,color:"var(--color-text-tertiary)",textAlign:"center",padding:"8px 0"}}>✅ Sin envases prestados extra</div>
          ) : (
            <>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                {totalPrestados.sifon>0&&<StatBox label="Sifones" val={totalPrestados.sifon} color="#f59e0b"/>}
                {totalPrestados.bidon10>0&&<StatBox label="10L" val={totalPrestados.bidon10} color="#f59e0b"/>}
                {totalPrestados.bidon20>0&&<StatBox label="20L" val={totalPrestados.bidon20} color="#f59e0b"/>}
              </div>
              <button style={{...s.btn,width:"100%",fontSize:13,padding:"8px"}} onClick={()=>setTab("clientes")}>
                Ver detalle por cliente →
              </button>
            </>
          )}
        </div>

        {/* SECCIÓN 4 — Depósito */}
        <div style={{...s.card,margin:"0 0 12px",borderLeft:"3px solid rgba(99,102,241,0.7)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#818cf8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>🏠 Depósito — Stock de reserva</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <StatBox label="Cajones" val={Math.floor((base.casa.sifon||0)/CAJON)} sub={`${base.casa.sifon||0} sif`} color="#e2ecff"/>
            <StatBox label="10L" val={base.casa.bidon10||0} color="#e2ecff"/>
            <StatBox label="20L" val={base.casa.bidon20||0} color="#e2ecff"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <InputStock lugar="casa" label="Cajones soda" field="sifon" isCajon={true}/>
            <InputStock lugar="casa" label="Bidón 10L" field="bidon10"/>
            <InputStock lugar="casa" label="Bidón 20L" field="bidon20"/>
          </div>
        </div>

        <button style={{...s.btnPrimary,background:guardado?"#0F6E56":undefined}} onClick={guardar}>
          {guardado?"✓ Guardado":"Guardar stock"}
        </button>
      </>)}

      {/* ══ TAB CLIENTES ══ */}
      {tab==="clientes"&&(<>
        <div style={{...s.card,margin:"0 0 12px",background:"var(--color-background-secondary)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>📊 Total envases prestados extra</div>
          <div style={{display:"flex",gap:8}}>
            <StatBox label="Sifones" val={totalPrestados.sifon} color={totalPrestados.sifon>0?"#f59e0b":"var(--color-text-tertiary)"}/>
            <StatBox label="10L" val={totalPrestados.bidon10} color={totalPrestados.bidon10>0?"#f59e0b":"var(--color-text-tertiary)"}/>
            <StatBox label="20L" val={totalPrestados.bidon20} color={totalPrestados.bidon20>0?"#f59e0b":"var(--color-text-tertiary)"}/>
          </div>
        </div>

        {clientesConPrestados.length===0 && (
          <p style={{textAlign:"center",color:"var(--color-text-tertiary)",padding:"30px 0",fontSize:14}}>✅ Ningún cliente tiene envases prestados extra</p>
        )}

        {clientesConPrestados.sort((a,b)=>{
          const dA=DIAS.indexOf(a.dia),dB=DIAS.indexOf(b.dia);
          return dA!==dB?dA-dB:(a.orden||9999)-(b.orden||9999);
        }).map(c=>{
          const ex=calcPrestados(c.id);
          const dir=c.calle?`${c.calle} ${c.nro||""}`:c.manzana?`Mz ${c.manzana} L ${c.lote}`:"";
          return(
            <div key={c.id} style={{...s.card,margin:"0 0 8px",borderLeft:"3px solid rgba(245,158,11,0.5)"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                <div style={{fontWeight:700,fontSize:17,color:"#ffffff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</div>
                <span style={{background:"#1D9E75",color:"#fff",fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>{c.dia}</span>
              </div>
              {dir&&<div style={{fontSize:17,color:"#c8d8e8",fontWeight:500,marginBottom:8}}>{dir}{c.barrio?` · ${c.barrio}`:""}</div>}
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
                {/* Habituales */}
                {c.sifon>0&&<span style={{background:"rgba(56,138,221,0.28)",color:"#fff",border:"1px solid rgba(56,138,221,0.5)",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>Sif ×{c.sifon} (hab.)</span>}
                {c.bidon10>0&&<span style={{background:"rgba(56,138,221,0.28)",color:"#fff",border:"1px solid rgba(56,138,221,0.5)",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>10L ×{c.bidon10} (hab.)</span>}
                {c.bidon20>0&&<span style={{background:"rgba(56,138,221,0.28)",color:"#fff",border:"1px solid rgba(56,138,221,0.5)",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>20L ×{c.bidon20} (hab.)</span>}
                {/* Prestados extra */}
                {ex.sifon>0&&<span style={{background:"rgba(245,158,11,0.28)",color:"#fff",border:"1px solid rgba(245,158,11,0.55)",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>+{ex.sifon} sif extra</span>}
                {ex.bidon10>0&&<span style={{background:"rgba(245,158,11,0.28)",color:"#fff",border:"1px solid rgba(245,158,11,0.55)",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>+{ex.bidon10} 10L extra</span>}
                {ex.bidon20>0&&<span style={{background:"rgba(245,158,11,0.28)",color:"#fff",border:"1px solid rgba(245,158,11,0.55)",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>+{ex.bidon20} 20L extra</span>}
              </div>
              {/* Total en su casa */}
              <div style={{background:"var(--color-background-tertiary)",borderRadius:8,padding:"6px 10px",fontSize:12,color:"var(--color-text-secondary)",marginBottom:8}}>
                📦 Total en su casa: {c.sifon+ex.sifon>0?`${c.sifon+ex.sifon} sif`:""} {c.bidon10+ex.bidon10>0?`${c.bidon10+ex.bidon10} bid 10L`:""} {c.bidon20+ex.bidon20>0?`${c.bidon20+ex.bidon20} bid 20L`:""}
              </div>
              <button onClick={()=>{
                const sif=Number(prompt(`Sifones prestados EXTRA de ${c.nombre} (0 si ya devolvió todos):`,ex.sifon));
                const b10=Number(prompt("Bidones 10L prestados extra:",ex.bidon10));
                const b20=Number(prompt("Bidones 20L prestados extra:",ex.bidon20));
                if(isNaN(sif)||isNaN(b10)||isNaN(b20)){alert("Cancelado");return;}
                const devs=[];
                if(ex.sifon-sif>0)devs.push({prod:"Sifón 1.5L",cant:ex.sifon-sif});
                if(ex.bidon10-b10>0)devs.push({prod:"Bidón 10L",cant:ex.bidon10-b10});
                if(ex.bidon20-b20>0)devs.push({prod:"Bidón 20L",cant:ex.bidon20-b20});
                if(devs.length===0){alert("Sin cambios");return;}
                const vt={id:Date.now(),clienteId:c.id,cliente:c.nombre,dia:"",fechaKey:new Date().toISOString().slice(0,10),
                  fecha:new Date().toLocaleString("es-AR"),detalle:[{nombre:"Ajuste envases",cantidad:1,precio:0,total:0}],
                  pago:"ajuste",obs:"Corrección manual de envases prestados",neto:0,bruto:0,desc:0,costo:0,ganancia:0,
                  pagadoNum:0,saldoDelta:0,_esAjuste:true,saldoAntes:c.saldo||0,saldoDespues:c.saldo||0,
                  envPrest:[],envDev:devs};
                onAjustarEnvases&&onAjustarEnvases(vt);
              }} style={{background:"rgba(226,75,74,0.2)",color:"#ffffff",border:"1px solid rgba(226,75,74,0.4)",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                ✏️ Corregir envases
              </button>
            </div>
          );
        })}
      </>)}

      </div>
    </div>
  );
}

function ConfirmacionesDia({dia,ventas,clientes,onConfirmar,onVolver}) {
  const [abiertos, setAbiertos] = React.useState({});
  const toggleFecha = (fk) => setAbiertos(o=>({...o,[fk]:!o[fk]}));
  const pendientes = ventas.filter(v=>!v.transConfirmada);
  const confirmadas = ventas.filter(v=>v.transConfirmada);
  const porCliente = {};
  pendientes.forEach(v=>{
    if(!porCliente[v.clienteId]) porCliente[v.clienteId]={cliente:clientes.find(c=>c.id===v.clienteId),ventas:[]};
    porCliente[v.clienteId].ventas.push(v);
  });
  const grupos = Object.values(porCliente);
  const totalPendiente = pendientes.reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const totalConfirmado = confirmadas.reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const confirmadasPorFecha = {};
  confirmadas.forEach(v=>{ const fk=v.fechaKey||"sin fecha"; if(!confirmadasPorFecha[fk])confirmadasPorFecha[fk]=[]; confirmadasPorFecha[fk].push(v); });
  const fechasConf = Object.keys(confirmadasPorFecha).sort().reverse();
  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Transferencias · {dia}</span>
      </div>
      <div style={{padding:"10px 14px 4px"}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{...s.card,flex:1,margin:0,background:"#1e3a5f",border:"1px solid #f5b942",padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#f5b942",fontWeight:500,textTransform:"uppercase",marginBottom:4}}>🔴 Pendientes</div>
            <div style={{fontSize:18,fontWeight:700,color:"#f5b942"}}>{fmt(totalPendiente)}</div>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{pendientes.length} transfer.</div>
          </div>
          <div style={{...s.card,flex:1,margin:0,background:"#0a2e1f",border:"1px solid #4dd9a0",padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#4dd9a0",fontWeight:500,textTransform:"uppercase",marginBottom:4}}>✓ Confirmadas</div>
            <div style={{fontSize:18,fontWeight:700,color:"#4dd9a0"}}>{fmt(totalConfirmado)}</div>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{confirmadas.length} transfer.</div>
          </div>
        </div>
        {grupos.length===0&&<p style={{textAlign:"center",padding:"20px 0",color:"var(--color-text-tertiary)",fontSize:14}}>✓ No hay transferencias pendientes para {dia}</p>}
        {grupos.map(({cliente:c,ventas:vts})=>(
          <div key={c?.id||Math.random()} style={{...s.card,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{c?.nombre||"Cliente desconocido"}</div>
                <div style={{fontSize:14,color:"var(--color-text-secondary)",marginTop:2}}>{c?.calle?`${c.calle} ${c.nro||""}`:c?.manzana?`Mz ${c.manzana} L ${c.lote}`:""}{c?.barrio?` · ${c.barrio}`:""}</div>
              </div>
              {c?.telefono&&<a href={`https://wa.me/54${c.telefono}`} target="_blank" rel="noreferrer" style={{fontSize:20,textDecoration:"none"}}>💬</a>}
            </div>
            {vts.map(v=>(
              <div key={v.id} style={{...s.card,margin:"0 0 6px",background:"var(--color-background-tertiary)",padding:"10px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:12,color:"var(--color-text-tertiary)"}}>{v.fechaKey} · {v.fecha?.slice(-8)||""}</div>
                    <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{(v.detalle||[]).map(d=>`${d.nombre}×${d.cantidad}`).join(" · ")}</div>
                  </div>
                  <span style={{fontSize:16,fontWeight:500,color:"#f5b942"}}>{fmt(v.pagadoNum||v.neto||0)}</span>
                </div>
                <button style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:"#185FA5",color:"#e2eaf4",fontSize:13,fontWeight:500,cursor:"pointer"}}
                  onClick={()=>onConfirmar(v.id)}>✓ Confirmar transferencia</button>
              </div>
            ))}
          </div>
        ))}
        {fechasConf.length>0&&(
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",margin:"8px 0 6px"}}>✓ Ya confirmadas</div>
            {fechasConf.map(fk=>{
              const vtsFecha=confirmadasPorFecha[fk];
              const totalFecha=vtsFecha.reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
              const open=!!abiertos[fk];
              return (
                <div key={fk} style={{...s.card,margin:"0 0 6px",background:"#0a2e1f",border:"0.5px solid #4dd9a0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>toggleFecha(fk)}>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:"#4dd9a0"}}>📅 {fk}</div>
                      <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>{vtsFecha.length} transferencia{vtsFecha.length!==1?"s":""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:15,fontWeight:600,color:"#4dd9a0"}}>{fmt(totalFecha)}</div>
                      <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:2}}>{open?"▲":"▼"}</div>
                    </div>
                  </div>
                  {open&&<div style={{marginTop:10,borderTop:"0.5px solid rgba(77,217,160,0.2)",paddingTop:8}}>
                    {vtsFecha.map(v=>{
                      const c=clientes.find(x=>x.id===v.clienteId);
                      return (
                        <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid rgba(77,217,160,0.15)"}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:18,color:"#ffffff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c?.nombre||"Cliente"}</div>
                            <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:1}}>{(v.detalle||[]).map(d=>`${d.nombre}×${d.cantidad}`).join(" · ")}</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                            <div style={{fontSize:13,fontWeight:500,color:"#4dd9a0"}}>{fmt(v.pagadoNum||v.neto||0)}</div>
                            <button style={{fontSize:10,color:"var(--color-text-tertiary)",background:"none",border:"none",cursor:"pointer",padding:"2px 0",textDecoration:"underline"}} onClick={()=>onConfirmar(v.id)}>desmarcar</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

                            ))}
                          </div>
                        </div>
                      ))}
                      <button style={{...s.btn,width:"100%",marginTop:10,fontSize:12,padding:"7px"}} onClick={e=>{e.stopPropagation();onStock();}}>Editar stock →</button>
