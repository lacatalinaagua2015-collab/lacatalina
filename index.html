        {/* Envases habituales del cliente */}
        {(()=>{const tags=[];if(cliente.sifon>0)tags.push(`Sifón×${cliente.sifon}`);if(cliente.bidon10>0)tags.push(`10L×${cliente.bidon10}`);if(cliente.bidon20>0)tags.push(`20L×${cliente.bidon20}`);return tags.length>0?(<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{tags.map(t=><span key={t} style={{...s.tag,background:"#1e3a5f",color:"var(--color-text-info)",border:"0.5px solid var(--color-border-info)",fontSize:11}}>🧴 {t}</span>)}</div>):null;})()}
        <span style={{...s.sectionTitle,padding:"0 0 10px"}}>Cantidades entregadas</span>
        {productos.map(p=>(
          <div key={p.id} style={{...s.card,margin:"0 0 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{p.nombre}</div><div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{fmt(p.precio)} c/u</div></div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button style={{...s.btn,padding:"5px 16px",fontSize:20,lineHeight:1}} onClick={()=>setCantidades(q=>({...q,[p.nombre]:Math.max(0,(q[p.nombre]||0)-1)}))}>−</button>
              <span style={{fontSize:22,fontWeight:500,minWidth:32,textAlign:"center",color:"var(--color-text-primary)"}}>{cantidades[p.nombre]||0}</span>
              <button style={{...s.btn,padding:"5px 16px",fontSize:20,lineHeight:1}} onClick={()=>setCantidades(q=>({...q,[p.nombre]:(q[p.nombre]||0)+1}))}>+</button>
            </div>
          </div>
        ))}
        <div style={s.divider} />
        <label style={{...s.label,fontSize:13,marginBottom:8}}>Forma de pago</label>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["contado","Contado"],["transferencia","Transfer."],["fiado","Fiado"],["mixto","Mixto"]].map(([v,l])=>(
            <button key={v} style={{...s.btn,flex:1,background:pago===v?"#185FA5":undefined,color:pago===v?"#fff":undefined,border:pago===v?"none":undefined,padding:"9px 4px",fontSize:13}} onClick={()=>setPago(v)}>{l}</button>
          ))}
        </div>
        {/* Pago mixto: efectivo + transferencia */}
        {pago==="mixto"&&(
          <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-tertiary)"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)",marginBottom:8}}>Desglose del pago mixto</div>
            <div style={{display:"flex",gap:8,marginBottom:6}}>
              <div style={{flex:1}}>
                <label style={s.label}>Efectivo $</label>
                <input style={s.input} type="number" placeholder="0" value={montoEfec} onChange={e=>setMontoEfec(e.target.value)} />
              </div>
              <div style={{flex:1}}>
                <label style={s.label}>Transferencia $</label>
                <input style={s.input} type="number" placeholder="0" value={montoTrans} onChange={e=>setMontoTrans(e.target.value)} />
              </div>
            </div>
            {Number(montoEfec||0)+Number(montoTrans||0)>0&&(
              <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>
                Total pagado: {fmt(Number(montoEfec||0)+Number(montoTrans||0))} de {fmt(aPagar)}
                {(Number(montoEfec||0)+Number(montoTrans||0))<aPagar&&
                  <span style={{color:"var(--color-text-warning)"}}> · Queda {fmt(aPagar-Number(montoEfec||0)-Number(montoTrans||0))} de saldo</span>}
              </div>
            )}
            {Number(montoTrans||0)>0&&(
              <div style={{...s.card,margin:"8px 0 0",background:transConfMixto?"#0a2e1f":"#1e3a5f",border:transConfMixto?"0.5px solid #4dd9a0":"0.5px solid #5daaff"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:transConfMixto?"#4dd9a0":"#5daaff"}}>{transConfMixto?"✓ Transfer. confirmada":"⏳ Confirmar transferencia"}</span>
                  <button style={{background:transConfMixto?"#4dd9a0":"#185FA5",color:transConfMixto?"#0a2e1f":"#fff",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}
                    onClick={()=>{setTransConfMixto(!transConfMixto);if(!transConfMixto)sonarTransferencia();}}>
                    {transConfMixto?"✓ OK":"Confirmar"}
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
        {/* Saldo a favor — descontarlo */}
        {saldoDisp>0&&pago!=="fiado"&&(
          <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-success)",border:"0.5px solid var(--color-border-success)",cursor:"pointer"}} onClick={()=>setUsarSaldo(!usarSaldo)}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <input type="checkbox" checked={usarSaldo} onChange={e=>setUsarSaldo(e.target.checked)} style={{width:18,height:18,cursor:"pointer",accentColor:"#0F6E56"}} />
              <label style={{fontSize:14,color:"var(--color-text-success)",cursor:"pointer",fontWeight:500}}>Usar saldo a favor — {fmt(saldoDisp)}</label>
            </div>
            {usarSaldo&&saldoApl>0&&<div style={{fontSize:12,color:"var(--color-text-success)",marginTop:4,paddingLeft:28}}>Se descuentan {fmt(saldoApl)} del total</div>}
          </div>
        )}

        {/* Saldo en contra — opciones de pago */}
        {cliente.saldo<0&&pago!=="fiado"&&(
          <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-danger)",border:"0.5px solid var(--color-border-danger)"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-danger)",marginBottom:8}}>
              Deuda pendiente: {fmt(Math.abs(cliente.saldo))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                ["todo","Paga deuda + compra de hoy",Math.abs(cliente.saldo)+aPagar],
                ["compra","Solo la compra de hoy",null],
                ["parcial","Pago parcial (ingresá el monto)",null],
              ].map(([op,label,total])=>(
                <button key={op}
                  style={{textAlign:"left",padding:"8px 12px",borderRadius:8,border:"0.5px solid var(--color-border-danger)",background:opcionSaldo===op?"#7f1d1d":"transparent",color:"var(--color-text-danger)",fontSize:12,cursor:"pointer",fontWeight:opcionSaldo===op?500:400}}
                  onClick={()=>setOpcionSaldo(op)}>
                  {opcionSaldo===op?"✓ ":""}{label}{total?` — ${fmt(total)}`:""}
                </button>
              ))}
            </div>
          </div>
        )}

        {pago!=="fiado"&&(
          <div style={{marginBottom:12}}>
            <label style={s.label}>
              {opcionSaldo==="parcial"?"Monto que paga (parcial)":opcionSaldo==="todo"?`Total a cobrar (deuda + compra):`:"Monto cobrado (vacío = ${fmt(aPagar)} exacto)"}
            </label>
            <input style={s.input} type="number"
              placeholder={opcionSaldo==="todo"?String(Math.round(Math.abs(cliente.saldo)+aPagar)):String(Math.round(aPagar))}
              value={monto} onChange={e=>setMonto(e.target.value)} />
          </div>
        )}
        <div style={s.divider} />
        <div style={{...s.card,margin:"0 0 12px",background:"var(--color-background-secondary)"}}>
          {bruto>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Subtotal</span><span style={{fontSize:13,color:"var(--color-text-primary)"}}>{fmt(bruto)}</span></div>}
          {desc>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Descuento 2.5%</span><span style={{fontSize:13,color:"var(--color-text-danger)"}}>−{fmt(desc)}</span></div>}
          {saldoApl>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Saldo a favor</span><span style={{fontSize:13,color:"var(--color-text-success)"}}>−{fmt(saldoApl)}</span></div>}
          <div style={{borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:10,marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <span style={{fontSize:16,fontWeight:500,color:"var(--color-text-primary)"}}>A cobrar</span>
            <span style={{fontSize:26,fontWeight:500,color:"var(--color-text-primary)"}}>{fmt(aPagar)}</span>
          </div>
        </div>
        <button style={{...s.btnPrimary,marginBottom:10,opacity:detalle.length===0?0.45:1}} disabled={detalle.length===0} onClick={()=>{
          if(pago==="mixto"){
            const ef=Number(montoEfec||0), tr=Number(montoTrans||0);
            const totalPagado=ef+tr;
            const saldoDelta=totalPagado-aPagar;
            if(ef>0) onGuardar(detalle,"contado",String(ef),saldoApl,envPrest,envDev,obs,"mixto_ef",tr,saldoDelta);
            else if(tr>0) onGuardar(detalle,"transferencia",String(tr),saldoApl,envPrest,envDev,obs,"mixto_tr",ef,saldoDelta);
          } else {
            const montoFinal = opcionSaldo==="todo"&&!monto
              ? String(Math.round(Math.abs(cliente.saldo)+aPagar))
              : monto;
            onGuardar(detalle,pago,montoFinal,saldoApl,envPrest,envDev,obs,opcionSaldo);
          }
        }}>
          ✓ Registrar entrega
        </button>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <button style={{flex:1,background:"var(--color-background-warning)",color:"var(--color-text-warning)",border:"0.5px solid var(--color-border-warning)",borderRadius:8,padding:"11px 8px",fontSize:13,fontWeight:500,cursor:"pointer"}}
            onClick={onNoEsta}>
            🔄 No está
          </button>
          <button style={{flex:1,background:"var(--color-background-danger)",color:"var(--color-text-danger)",border:"0.5px solid var(--color-border-danger)",borderRadius:8,padding:"11px 8px",fontSize:13,fontWeight:500,cursor:"pointer"}}
            onClick={onNoQuiere}>
            🚫 No quiere
          </button>
        </div>
        {/* Cobrar deuda sin entrega */}
        {cliente.saldo<0&&(
          <CobroDeudaPanel saldo={cliente.saldo} onCobrar={(mCobro,pCobro)=>{
            onGuardar([{nombre:"Cobro de deuda",cantidad:1,precio:0,total:0}],pCobro,String(mCobro),0,[],[],`Cobro de deuda $${mCobro.toLocaleString("es-AR")} (${pCobro})`,"cobro_deuda");
          }} />
        )}
        <div style={s.divider} />
        <label style={{...s.label,fontSize:13,marginBottom:6}}>Envases prestados al cliente</label>
        {envPrest.map((_,i)=><ER key={i} list={envPrest} setList={setEnvPrest} i={i} />)}
        <button style={{...s.btn,fontSize:12,padding:"4px 12px",marginBottom:12}} onClick={()=>setEnvPrest([...envPrest,{prod:"",cant:""}])}>+ Fila</button>
        <label style={{...s.label,fontSize:13,marginBottom:6}}>Envases devueltos por el cliente</label>
        {envDev.map((_,i)=><ER key={i} list={envDev} setList={setEnvDev} i={i} />)}
        <button style={{...s.btn,fontSize:12,padding:"4px 12px",marginBottom:12}} onClick={()=>setEnvDev([...envDev,{prod:"",cant:""}])}>+ Fila</button>
        <div style={s.divider} />
        <label style={s.label}>Observaciones</label>
        <textarea style={{...s.input,minHeight:60,resize:"vertical",marginBottom:14}} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Notas opcionales..." />
      </div>
    </div>
  );
}

    </div>
  );
}


// ─── MÓDULO PROMOCIÓN ────────────────────────────────────────────────────────

function CargaHistorica({clientes,productos,onGuardar,onVolver,enConfig}) {
  const DIAS_REP = ["Martes","Miércoles","Jueves","Viernes","Sábado"];
  const [fecha,setFecha]   = React.useState("2026-01-06");
  const [dia,setDia]       = React.useState("Martes");
  const [filas,setFilas]   = React.useState([]);
  const [guardando,setGuardando] = React.useState(false);
  const [guardados,setGuardados] = React.useState(0);

  // Clientes del día seleccionado
  const clientesDia = clientes.filter(c=>c.dia===dia).sort((a,b)=>(a.orden||999)-(b.orden||999));

  // Al cambiar la fecha, auto-detectar el día
  const onFechaChange = (f) => {
    setFecha(f);
    const d = new Date(f+'T12:00:00');
    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const nombreDia = dias[d.getDay()];
    if(DIAS_REP.includes(nombreDia)) setDia(nombreDia);
  };

  // Fila vacía
  const filaVacia = (clienteId="") => ({
    clienteId, cantidad_sifon:0, cantidad_b10:0, cantidad_b20:0,
    pago:"contado", monto:"", obs:""
  });

  // Cargar clientes del día como filas
  const cargarClientes = () => {
    setFilas(clientesDia.map(c=>filaVacia(c.id)));
  };

  const setFila = (i,campo,val) => setFilas(fs=>fs.map((f,j)=>j===i?{...f,[campo]:val}:f));

  const filasConVenta = filas.filter(f=>f.clienteId&&(f.cantidad_sifon>0||f.cantidad_b10>0||f.cantidad_b20>0||Number(f.monto)>0));

  const guardar = () => {
    if(!filasConVenta.length){alert("No hay ventas para guardar");return;}
    const nuevasVentas = [];
    const fechaKey = fecha;
    filasConVenta.forEach(f=>{
      const c = clientes.find(x=>x.id===f.clienteId);
      if(!c) return;
      const ps = productos||[];
      const detalle = [];
      const getSifon = ps.find(p=>p.nombre==="Sifón 1.5L");
      const getB10   = ps.find(p=>p.nombre==="Bidón 10L");
      const getB20   = ps.find(p=>p.nombre==="Bidón 20L");
      if(f.cantidad_sifon>0&&getSifon) detalle.push({nombre:getSifon.nombre,cantidad:Number(f.cantidad_sifon),precio:getSifon.precio,total:Number(f.cantidad_sifon)*getSifon.precio});
      if(f.cantidad_b10>0&&getB10)     detalle.push({nombre:getB10.nombre,  cantidad:Number(f.cantidad_b10),  precio:getB10.precio,  total:Number(f.cantidad_b10)*getB10.precio});
      if(f.cantidad_b20>0&&getB20)     detalle.push({nombre:getB20.nombre,  cantidad:Number(f.cantidad_b20),  precio:getB20.precio,  total:Number(f.cantidad_b20)*getB20.precio});
      if(!detalle.length&&Number(f.monto)>0) detalle.push({nombre:"Venta histórica",cantidad:1,precio:Number(f.monto),total:Number(f.monto)});
      const bruto = detalle.reduce((a,d)=>a+d.total,0);
      const pagadoNum = Number(f.monto)||bruto;
      const saldoDelta = f.pago==="fiado"?-bruto:pagadoNum-bruto;
      nuevasVentas.push({
        id: Date.now()+nuevasVentas.length,
        clienteId:c.id, cliente:c.nombre,
        dia, fechaKey, fecha: `${fecha} (historial)`,
        detalle, pago:f.pago, obs:f.obs||"Carga histórica",
        bruto, desc:0, neto:bruto, costo:0, ganancia:bruto,
        pagadoNum, saldoAplicado:0, saldoDelta,
        envPrest:[], envDev:[],
      });
    });
    setGuardando(true);
    onGuardar(nuevasVentas);
    setGuardados(g=>g+nuevasVentas.length);
    setFilas([]);
    setGuardando(false);
    alert(`✅ ${nuevasVentas.length} ventas guardadas para el ${fecha}`);
  };

  return (
    <div style={s.screen}>
      {!enConfig&&<div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Carga histórica</span>
        {guardados>0&&<span style={{fontSize:12,color:"#4dd9a0"}}>{guardados} guardadas</span>}
      </div>}
      {enConfig&&guardados>0&&<div style={{padding:"4px 16px",fontSize:12,color:"#4dd9a0"}}>✓ {guardados} ventas guardadas</div>}
      <div style={{padding:16}}>

        {/* Selector fecha y día */}
        <div style={{...s.card,marginBottom:12}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:2}}>
              <label style={s.label}>Fecha del reparto</label>
              <input type="date" style={s.input} value={fecha}
                min="2026-01-01" max="2026-03-31"
                onChange={e=>onFechaChange(e.target.value)}/>
            </div>
            <div style={{flex:1}}>
              <label style={s.label}>Día</label>
              <select style={s.select} value={dia} onChange={e=>setDia(e.target.value)}>
                {DIAS_REP.map(d=><option key={d}>{d}</option>)}
              </select>
            </div>
          </div>
          <button style={{...s.btnPrimary,width:"100%",padding:"12px",fontSize:14}}
            onClick={cargarClientes}>
            📋 Cargar clientes del {dia} ({clientesDia.length} clientes)
          </button>
        </div>

        {/* Tabla de carga */}
        {filas.length>0&&(
          <>
            <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:8}}>
              Dejá en 0 los que no compraron ese día. Solo se guardan los que tienen cantidad o monto.
            </div>
            {filas.map((f,i)=>{
              const c = clientes.find(x=>x.id===f.clienteId);
              if(!c) return null;
              const tieneVenta = f.cantidad_sifon>0||f.cantidad_b10>0||f.cantidad_b20>0||Number(f.monto)>0;
              return (
                <div key={i} style={{...s.card,margin:"0 0 8px",borderLeft:tieneVenta?"3px solid #4dd9a0":"0.5px solid var(--color-border-tertiary)"}}>
                  <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)",marginBottom:8}}>
                    {c.orden&&<span style={{color:"var(--color-text-tertiary)",fontSize:12,marginRight:6}}>#{c.orden}</span>}
                    {c.nombre}
                    {c.sifon>0&&<span style={{fontSize:11,color:"var(--color-text-tertiary)",marginLeft:6}}>hab: S×{c.sifon}{c.bidon10>0?` B10×${c.bidon10}`:""}{c.bidon20>0?` B20×${c.bidon20}`:""}</span>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                    {[["cantidad_sifon","Sifón"],["cantidad_b10","Bidón 10L"],["cantidad_b20","Bidón 20L"]].map(([k,l])=>(
                      <div key={k}>
                        <label style={{...s.label,fontSize:10}}>{l}</label>
                        <input style={{...s.inputNum,textAlign:"center"}} type="number" min={0}
                          value={f[k]||""} placeholder="0"
                          onChange={e=>setFila(i,k,Number(e.target.value)||0)}/>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    <div>
                      <label style={{...s.label,fontSize:10}}>Pago</label>
                      <select style={{...s.select,fontSize:12}} value={f.pago} onChange={e=>setFila(i,"pago",e.target.value)}>
                        {[["contado","Contado"],["transferencia","Transfer."],["fiado","Fiado"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{...s.label,fontSize:10}}>Monto cobrado $</label>
                      <input style={{...s.inputNum,textAlign:"right"}} type="number" min={0}
                        value={f.monto} placeholder="auto"
                        onChange={e=>setFila(i,"monto",e.target.value)}/>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Resumen */}
            <div style={{...s.card,margin:"8px 0",background:"var(--color-background-secondary)"}}>
              <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>
                {filasConVenta.length} ventas a guardar del {fecha}
              </div>
            </div>

            <button style={{...s.btnPrimary,width:"100%",padding:"14px",fontSize:15,borderRadius:12,opacity:filasConVenta.length===0?0.5:1}}
              disabled={filasConVenta.length===0}
              onClick={guardar}>
              💾 Guardar {filasConVenta.length} ventas del {fecha}
            </button>
            <button style={{...s.btn,width:"100%",padding:"10px",fontSize:13,marginTop:8}}
              onClick={()=>setFilas([])}>
              Limpiar y cargar otro día
            </button>
          </>
        )}

        {filas.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:"var(--color-text-tertiary)",fontSize:14,lineHeight:1.8}}>
            Seleccioná una fecha y tocá{"\n"}"Cargar clientes del día"{"\n"}para empezar la carga.
          </div>
        )}
      </div>
    </div>
  );
}


function Promocion({prospectos,onSave,onConvertir,onVolver}) {
  const [diaActivo,setDiaActivo] = useState("");
  const [subVista,setSubVista]   = useState("menu"); // menu | dia | detalle | nuevo | comodato
  const [selId,setSelId]         = useState(null);

  const hoyISO = new Date().toISOString().slice(0,10);

  const compras    = (p) => (p.visitas||[]).filter(v=>v.resultado==="compro").length;
  const semanas    = (p) => Math.floor((Date.now()-new Date(p.fechaInicio||hoyISO).getTime())/(7*24*3600*1000));
  const listo      = (p) => compras(p)>=4;
  const visitadoHoy= (p) => (p.visitas||[]).some(v=>v.fecha===hoyISO);

  const porDia = (d) => prospectos.filter(p=>p.dia===d&&p.estado!=="convertido");
  const selP   = prospectos.find(p=>p.id===selId);

  const registrar = (id,resultado) => {
    const nps = prospectos.map(p=>{
      if(p.id!==id) return p;
      const v=[...(p.visitas||[]),{fecha:hoyISO,resultado}];
      return {...p,visitas:v,listoConvertir:v.filter(x=>x.resultado==="compro").length>=4};
    });
    onSave(nps);
  };

  const guardarComodato = (id,cmd) => {
    onSave(prospectos.map(p=>p.id===id?{...p,comodato:{...cmd,fecha:new Date().toLocaleDateString("es-AR")}}:p));
  };

  const agregarProspecto = (datos) => {
    onSave([...prospectos,{...datos,id:Date.now(),estado:"activo",fechaInicio:hoyISO,visitas:[],listoConvertir:false}]);
  };

  const eliminar = (id) => {
    onSave(prospectos.filter(p=>p.id!==id));
  };

  if(subVista==="nuevo") return (
    <PromoNuevo
      diaInicial={diaActivo||"Martes"}
      onGuardar={(d)=>{agregarProspecto(d);setDiaActivo(d.dia);setSubVista("dia");}}
      onVolver={()=>setSubVista(diaActivo?"dia":"menu")}
    />
  );

  if(subVista==="comodato"&&selP) return (
    <PromoComodato
      prospecto={selP}
      onGuardar={(cmd)=>{guardarComodato(selP.id,cmd);setSubVista("detalle");}}
      onVolver={()=>setSubVista("detalle")}
    />
  );

  if(subVista==="detalle"&&selP) return (
    <PromoDetalle
      prospecto={selP}
      listo={listo(selP)}
      comprasCount={compras(selP)}
      semanasCount={semanas(selP)}
      visitadoHoy={visitadoHoy(selP)}
      onRegistrar={(r)=>registrar(selP.id,r)}
      onComodato={()=>setSubVista("comodato")}
      onEditar={(datos)=>onSave(prospectos.map(p=>p.id===selP.id?{...p,...datos}:p))}
      onActualizarEnvases={(id,cambios)=>{
        onSave(prospectos.map(p=>p.id===id?{...p,...cambios}:p));
      }}
      onConvertir={()=>{
        onConvertir({
          nombre:selP.nombre, dia:selP.dia, barrio:selP.barrio||"",
          manzana:selP.manzana||"", lote:selP.lote||"", sector:selP.sector||"",
          calle:selP.calle||"", nro:selP.nro||"", aclaracion:selP.depto||"",
          telefono:selP.telefono||"", maps:selP.maps||"", notas:selP.notas||"",
          sifon:    selP.sifon||selP.comodato?.sifon||0,
          bidon10:  selP.bidon10||selP.comodato?.bidon10||0,
          bidon20:  selP.bidon20||selP.comodato?.bidon20||0,
          dispenser:selP.dispenser||selP.comodato?.dispenser||0,
          orden: undefined,
        });
        setSubVista("dia");
      }}
      onEliminar={()=>{eliminar(selP.id);setSubVista("dia");}}
      onVolver={()=>setSubVista("dia")}
    />
  );

  if(subVista==="dia") {
    const lista = porDia(diaActivo);
    return (
      <div style={s.screen}>
        <div style={s.header}>
          <button style={s.backBtn} onClick={()=>setSubVista("menu")}>← Volver</button>
          <span style={s.headerTitle}>Promoción · {diaActivo}</span>
          <button style={{...s.btn,padding:"6px 12px",fontSize:12,background:"#185FA5",color:"#e2eaf4",border:"none"}}
            onClick={()=>setSubVista("nuevo")}>+ Nuevo</button>
        </div>
        <div style={{padding:"8px 14px 4px"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span style={s.badge("info")}>{lista.length} prospectos</span>
            {lista.filter(listo).length>0&&<span style={s.badge("success")}>{lista.filter(listo).length} listos ✓</span>}
          </div>
        </div>
        {lista.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:"var(--color-text-tertiary)",fontSize:14}}>
            No hay prospectos para {diaActivo}.<br/>
            <span style={{fontSize:12}}>Tocá "+ Nuevo" para agregar uno.</span>
          </div>
        )}
        {lista.map(p=>{
          const c=compras(p), s=semanas(p), vhoy=visitadoHoy(p), lst=listo(p);
          const bc=lst?"#4dd9a0":vhoy?"#5daaff":"var(--color-border-tertiary)";
          return (
            <div key={p.id} style={{...s.card,borderLeft:`3px solid ${bc}`,cursor:"pointer"}}
              onClick={()=>{setSelId(p.id);setSubVista("detalle");}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:14,color:"var(--color-text-primary)"}}>{p.nombre}</div>
                  <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>
                    {p.barrio}{p.calle?` · ${p.calle} ${p.nro||""}`:p.manzana?` · Mz ${p.manzana} L ${p.lote}`:""}
                  </div>
                  {p.fechaInicio&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:1}}>Cargado: {new Date(p.fechaInicio).toLocaleDateString("es-AR")}</div>}
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:5}}>
                    <span style={s.tag}>{s} sem.</span>
                    <span style={{...s.tag,color:"#4dd9a0"}}>{c}/4 compras</span>
                    {lst&&<span style={s.badge("success")}>✓ Listo</span>}
                    {vhoy&&<span style={s.badge("info")}>Visitado hoy</span>}
                    {p.comodato&&<span style={s.badge("warning")}>📋 Comodato</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginLeft:10}}>
                  {p.maps&&<a href={p.maps} target="_blank" rel="noreferrer" style={{fontSize:18,textDecoration:"none"}} onClick={e=>e.stopPropagation()}>📍</a>}
                  {p.telefono&&<a href={`https://wa.me/54${p.telefono}`} target="_blank" rel="noreferrer" style={{fontSize:18,textDecoration:"none"}} onClick={e=>e.stopPropagation()}>💬</a>}
                </div>
              </div>
              <div style={{height:5,borderRadius:3,background:"var(--color-background-tertiary)",marginTop:8}}>
                <div style={{height:5,borderRadius:3,background:lst?"#4dd9a0":"#185FA5",width:`${Math.min(100,c/4*100)}%`}}/>
              </div>
              <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:3}}>{lst?"✓ 4 semanas completadas":`${c}/4 semanas de compra`}</div>
            </div>
          );
        })}
      </div>
    );
  }

  // ── Menú principal ─────────────────────────────────────────────────────────
  const activos     = prospectos.filter(p=>p.estado==="activo").length;
  const listos      = prospectos.filter(p=>p.listoConvertir&&p.estado==="activo").length;
  const convertidos = prospectos.filter(p=>p.estado==="convertido").length;
  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Promoción</span>
        <button style={{...s.btn,padding:"6px 12px",fontSize:12,background:"#185FA5",color:"#e2eaf4",border:"none"}}
          onClick={()=>setSubVista("nuevo")}>+ Nuevo</button>
      </div>
      <div style={{...s.grid3,padding:"10px 14px 8px",gap:6}}>
        <div style={s.metricCard}><div style={s.metricLabel}>En promoción</div><div style={{...s.metricVal,color:"#5daaff"}}>{activos}</div></div>
        <div style={s.metricCard}><div style={s.metricLabel}>Listos ✓</div><div style={{...s.metricVal,color:"#4dd9a0"}}>{listos}</div></div>
        <div style={s.metricCard}><div style={s.metricLabel}>Convertidos</div><div style={s.metricVal}>{convertidos}</div></div>
      </div>
      {listos>0&&(
        <div style={{...s.card,margin:"0 14px 6px",background:"#0a2e1f",border:"0.5px solid #4dd9a0"}}>
          <div style={{fontSize:13,color:"#4dd9a0",fontWeight:500}}>✓ {listos} listo{listos>1?"s":""} para convertir</div>
          <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>Entrá al día para agregarlos como clientes</div>
        </div>
      )}
      <span style={s.sectionTitle}>Seleccionar día</span>
      <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:8}}>
        {DIAS.map(d=>{
          const total=porDia(d).length, lst=porDia(d).filter(listo).length;
          return (
            <button key={d} style={{...s.card,margin:0,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px"}}
              onClick={()=>{setDiaActivo(d);setSubVista("dia");}}>
              <div>
                <div style={{fontSize:15,fontWeight:500,color:"var(--color-text-primary)"}}>{d}</div>
                <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{total} prospectos{lst>0?` · ${lst} listos`:""}</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {lst>0&&<span style={s.badge("success")}>{lst} ✓</span>}
                <span style={{color:"var(--color-text-tertiary)",fontSize:18}}>→</span>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

    nombre:p.nombre||"", dia:p.dia||"Martes",
    barrio:p.barrio||"", sector:p.sector||"",
    manzana:p.manzana||"", lote:p.lote||"",
    calle:p.calle||"", nro:p.nro||"",
    piso:p.piso||"", depto:p.depto||"",
    telefono:p.telefono||"", maps:p.maps||"",
    notas:p.notas||"", dni:p.dni||"",
    foto:p.foto||"", orden:p.orden||"",
    sifon:p.sifon||0, bidon10:p.bidon10||0,

          <div><label style={s.label}>Orden en promoción</label>

          </div>
        </div>
        <div><label style={s.label}>Familia / Nombre *</label><input style={s.input} placeholder="Apellido y nombre" value={d.nombre} onChange={e=>s2("nombre",e.target.value)} /></div>
        <div><label style={s.label}>Barrio</label><input style={s.input} placeholder="Barrio" value={d.barrio} onChange={e=>s2("barrio",e.target.value)} /></div>
        <div style={s.grid3}>
          <div><label style={s.label}>Sector</label><input style={s.input} placeholder="Sec" value={d.sector} onChange={e=>s2("sector",e.target.value)} /></div>
          <div><label style={s.label}>Manzana</label><input style={s.input} placeholder="Mz" value={d.manzana} onChange={e=>s2("manzana",e.target.value)} /></div>
          <div><label style={s.label}>Lote</label><input style={s.input} placeholder="Lote" value={d.lote} onChange={e=>s2("lote",e.target.value)} /></div>
        </div>
        <div style={s.grid2}>
          <div><label style={s.label}>Calle</label><input style={s.input} placeholder="Calle" value={d.calle} onChange={e=>s2("calle",e.target.value)} /></div>

        </div>
        <div style={s.grid2}>
          <div><label style={s.label}>Piso</label><input style={s.input} placeholder="—" value={d.piso} onChange={e=>s2("piso",e.target.value)} /></div>
          <div><label style={s.label}>Depto</label><input style={s.input} placeholder="—" value={d.depto} onChange={e=>s2("depto",e.target.value)} /></div>
        </div>
        <div><label style={s.label}>Teléfono (sin 0 ni 15)</label><input style={s.input} placeholder="3816559000" value={d.telefono} onChange={e=>s2("telefono",e.target.value)} /></div>
        <div><label style={s.label}>D.N.I.</label><input style={s.input} placeholder="00.000.000" value={d.dni} onChange={e=>s2("dni",e.target.value)} /></div>
        <div><label style={s.label}>Link Google Maps</label><input style={s.input} placeholder="https://maps.app.goo.gl/..." value={d.maps} onChange={e=>s2("maps",e.target.value)} /></div>
        <div><label style={s.label}>Link foto del domicilio</label><input style={s.input} placeholder="https://..." value={d.foto} onChange={e=>s2("foto",e.target.value)} /></div>

        <div><label style={s.label}>Notas</label><input style={s.input} placeholder="timbre roto, perro, deuda..." value={d.notas} onChange={e=>s2("notas",e.target.value)} /></div>

        <div style={s.grid3}>
          {[["sifon","Sifón"],["bidon10","10L"],["bidon20","20L"]].map(([k,l])=>(
            <div key={k}><label style={{...s.label,textAlign:"center"}}>{l}</label>
              <input style={{...s.input,textAlign:"center"}} type="number" min={0} value={d[k]||0} onChange={e=>s2(k,Number(e.target.value))} />
            </div>
          ))}

        <div>
          <label style={s.label}>Dispenser</label>
          <div style={{display:"flex",alignItems:"center",gap:12}}>

          </div>
        </div>
        <button style={{...s.btnPrimary,marginTop:6,opacity:!d.nombre?0.45:1}} disabled={!d.nombre} onClick={()=>onGuardar(d)}>
          Guardar cambios
        </button>
      </div>
    </div>
  );
}


function EnvasesProspecto({prospecto:p, onActualizar}) {
  const [editando, setEditando] = useState(false);
  const [vals, setVals] = useState({
    sifon: p.sifon||0, bidon10: p.bidon10||0,
    bidon20: p.bidon20||0, dispenser: p.dispenser||0
  });
  const sv = (k,v) => setVals(x=>({...x,[k]:v}));
  const tiene = vals.sifon>0||vals.bidon10>0||vals.bidon20>0||vals.dispenser>0;

  return (
    <div style={{...s.card,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editando?10:0}}>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>Envases en comodato</div>
          {!editando&&(
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>
              {vals.sifon>0    && <span style={s.tag}>Sifón ×{vals.sifon}</span>}
              {vals.bidon10>0  && <span style={s.tag}>10L ×{vals.bidon10}</span>}
              {vals.bidon20>0  && <span style={s.tag}>20L ×{vals.bidon20}</span>}
              {vals.dispenser>0 && <span style={{...s.tag,color:"#5daaff"}}>Disp ×{vals.dispenser}</span>}
              {!tiene && <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>Sin envases cargados</span>}
            </div>
          )}
        </div>
        <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={()=>{
          if(editando){ onActualizar({sifon:vals.sifon,bidon10:vals.bidon10,bidon20:vals.bidon20,dispenser:vals.dispenser}); }
          setEditando(!editando);
        }}>
          {editando?"Guardar":"Editar"}
        </button>
      </div>
      {editando&&(
        <>
          <div style={s.grid3}>
            {[["sifon","Sifón"],["bidon10","Bidón 10L"],["bidon20","Bidón 20L"]].map(([k,l])=>(
              <div key={k}>
                <label style={{...s.label,textAlign:"center"}}>{l}</label>
                <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
                  <button style={{...s.btn,padding:"3px 10px",fontSize:16,lineHeight:1}} onClick={()=>sv(k,Math.max(0,(vals[k]||0)-1))}>−</button>
                  <span style={{fontSize:16,fontWeight:500,minWidth:24,textAlign:"center",color:"var(--color-text-primary)"}}>{vals[k]||0}</span>
                  <button style={{...s.btn,padding:"3px 10px",fontSize:16,lineHeight:1}} onClick={()=>sv(k,(vals[k]||0)+1)}>+</button>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:8}}>
            <label style={s.label}>Dispenser</label>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button style={{...s.btn,padding:"4px 14px",fontSize:18,lineHeight:1}} onClick={()=>sv("dispenser",Math.max(0,(vals.dispenser||0)-1))}>−</button>
              <span style={{fontSize:18,fontWeight:500,minWidth:28,textAlign:"center",color:"var(--color-text-primary)"}}>{vals.dispenser||0}</span>
              <button style={{...s.btn,padding:"4px 14px",fontSize:18,lineHeight:1}} onClick={()=>sv("dispenser",(vals.dispenser||0)+1)}>+</button>
              <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>unidades</span>
            </div>
          </div>
        </>
      )}
    </div>
  );
}


function PromoDetalle({prospecto:p,listo,comprasCount,semanasCount,visitadoHoy,onRegistrar,onComodato,onConvertir,onEliminar,onVolver,onActualizarEnvases,onEditar}) {
  const [editando,setEditando] = useState(false);
  if(editando) return <EditarProspecto prospecto={p} onGuardar={(datos)=>{onEditar(datos);setEditando(false);}} onVolver={()=>setEditando(false)} />;
  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>{p.nombre}</span>
        <div style={{display:"flex",gap:6}}>
          <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={()=>setEditando(true)}>Editar</button>
          <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={onComodato}>📋</button>
        </div>
      </div>
      <div style={{padding:14}}>
        <div style={{...s.card,borderLeft:"3px solid #5daaff",marginBottom:10}}>

function GestionClientes({clientes,onEditar,onEliminar,onNuevo,onVolver,onReordenarTodo,onRegistrarVenta,onVerDetalle,ventas}) {
  const [fotoClienteId,setFotoClienteId] = React.useState(null);
  const fotoCliente = fotoClienteId ? clientes.find(c=>c.id===fotoClienteId) : null;
  const [busqueda,setBusqueda]   = useState("");
  const [filtroDia,setFiltroDia] = useState("todos");
  const [modoNuevo,setModoNuevo] = useState(false);
  const [editandoId,setEditandoId] = useState(null);

  // Calcular envases extra por cliente
  const extraEnvases = React.useMemo(()=>{
    const m={};
    (ventas||[]).forEach(v=>{
      if(!m[v.clienteId]) m[v.clienteId]={sifon:0,bidon10:0,bidon20:0};
      (v.envPrest||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)m[v.clienteId][k]+=Number(e.cant)||0;});
      (v.envDev||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)m[v.clienteId][k]-=Number(e.cant)||0;});
    });
    return m;
  },[ventas]);

  const filtrados = clientes
    .filter(c=>filtroDia==="todos"||c.dia===filtroDia)
    .filter(c=>c.nombre.toLowerCase().includes(busqueda.toLowerCase())||
               (c.barrio||"").toLowerCase().includes(busqueda.toLowerCase())||
               (c.telefono||"").includes(busqueda))
    .sort((a,b)=>{
    if(a.dia!==b.dia) return DIAS.indexOf(a.dia)-DIAS.indexOf(b.dia);
    return (a.orden||9999)-(b.orden||9999);
  });

  return (
    <>
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Gestión de clientes</span>
        <button style={{...s.btn,padding:"6px 12px",fontSize:12,background:"#185FA5",color:"#e2eaf4",border:"none"}}
          onClick={()=>{setModoNuevo(true);setEditandoId(null);}}>
          + Nuevo
        </button>
      </div>

      {/* Filtros */}
      <div style={{padding:"10px 14px 6px"}}>
        <input style={s.input} placeholder="Buscar por nombre, barrio o teléfono..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} />
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
          {["todos",...DIAS].map(d=>(
            <button key={d} style={{...s.btn,fontSize:11,padding:"3px 10px",
              background:filtroDia===d?"#185FA5":"var(--color-background-tertiary)",
              color:filtroDia===d?"#e2eaf4":"var(--color-text-secondary)",
              border:filtroDia===d?"none":"0.5px solid var(--color-border-secondary)"}}
              onClick={()=>setFiltroDia(d)}>
              {d==="todos"?"Todos":d}
            </button>
          ))}
          <button style={{...s.btn,fontSize:11,padding:"3px 10px",marginLeft:"auto"}}
          onClick={()=>{
            const porDia = {};
            DIAS.forEach(d=>{ porDia[d]=[...clientes].filter(c=>c.dia===d).sort((a,b)=>(a.orden||9999)-(b.orden||9999)); });
            const compactados = clientes.map(c=>{
              const lista = porDia[c.dia];
              const idx = lista.findIndex(x=>x.id===c.id);
              return idx>=0 ? {...c, orden:idx+1} : c;
            });
            if(window.confirm("¿Reordenar todos los clientes eliminando los huecos en la numeración?")) onReordenarTodo(compactados);
          }}>
          ↺ Reordenar
        </button>
        </div>
        <p style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:6}}>
          {filtrados.length} clientes{filtroDia!=="todos"?` · ${filtroDia}`:""}
        </p>
      </div>

      {/* Formulario nuevo cliente */}
      {modoNuevo && (
        <div style={{...s.card,margin:"6px 14px",borderLeft:"3px solid #185FA5"}}>
          <div style={{...s.row,justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Nuevo cliente</span>
            <button style={{...s.btn,fontSize:11,padding:"3px 10px"}} onClick={()=>setModoNuevo(false)}>Cancelar</button>
          </div>
          <FormCliente
            inicial={{nombre:"",dia:"Martes",barrio:"",manzana:"",lote:"",sector:"",calle:"",nro:"",aclaracion:"",telefono:"",maps:"",notas:"",sifon:0,bidon10:0,bidon20:0,orden:""}}
            onGuardar={(datos)=>{onNuevo(datos);setModoNuevo(false);}}
          />
        </div>
      )}

      {/* Lista */}
      {filtrados.map(c=>(
        <div key={c.id} style={{...s.card,borderLeft:editandoId===c.id?"3px solid #5daaff":"0.5px solid var(--color-border-tertiary)"}}>
          {editandoId===c.id ? (
            <>
              <div style={{...s.row,justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Editando</span>
                <button style={{...s.btn,fontSize:11,padding:"3px 10px"}} onClick={()=>setEditandoId(null)}>Cancelar</button>
              </div>
              <FormCliente
                inicial={c}
                onGuardar={(datos)=>{onEditar(c.id,datos);setEditandoId(null);}}
              />
              {/* Ajuste de envases EXTRA prestados (editable) */}
              {(()=>{
                const ex = extraEnvases[c.id]||{sifon:0,bidon10:0,bidon20:0};
                // total actual prestado = calculado desde ventas + ajuste manual
                // el usuario edita el TOTAL directamente; envAjuste = total - ex
                const aj = c.envAjuste||{sifon:0,bidon10:0,bidon20:0};
                const total = {sifon:ex.sifon+(aj.sifon||0),bidon10:ex.bidon10+(aj.bidon10||0),bidon20:ex.bidon20+(aj.bidon20||0)};
                const setTotal=(k,val)=>{
                  const n=Number(val)||0;
                  onEditar(c.id,{envAjuste:{...aj,[k]:n-(ex[k]||0)}});
                };
                return (
                  <div style={{...s.card,margin:"4px 0",background:"var(--color-background-tertiary)",padding:"10px 12px",borderLeft:"3px solid var(--color-border-warning)"}}>

}

function Resumen({ventas,clientes,productos,planillas,noVisitas,onVolver}) {
  const [filtro,setFiltro]   = React.useState("mes");   // mes | anio | todo | dia
  const [mesSel,setMesSel]   = React.useState(()=>new Date().toISOString().slice(0,7)); // YYYY-MM
  const [diaSel,setDiaSel]   = React.useState("todos");
  const chartRefs = {bar:React.useRef(null),donut:React.useRef(null),line:React.useRef(null)};
  const chartInst = React.useRef({});

  // ── Filtrado ──────────────────────────────────────────────────────────────
  const filtradas = React.useMemo(()=>{
    let r = ventas;
    if(filtro==="mes")  r = r.filter(v=>(v.fechaKey||v.fecha||"").slice(0,7)===mesSel);
    if(filtro==="anio") r = r.filter(v=>(v.fechaKey||v.fecha||"").slice(0,4)===mesSel.slice(0,4));
    if(filtro==="dia")  r = diaSel==="todos" ? r : r.filter(v=>v.dia===diaSel);
    return r;
  },[ventas,filtro,mesSel,diaSel]);

  // ── Métricas ──────────────────────────────────────────────────────────────
  const totalNeto    = filtradas.reduce((a,v)=>a+(v.neto||0),0);
  const totalGan     = filtradas.reduce((a,v)=>a+(v.ganancia||0),0);
  const totalCosto   = filtradas.reduce((a,v)=>a+(v.costo||0),0);
  const cobEfectivo  = filtradas.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.neto||0),0);
  const cobTrans     = filtradas.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.neto||0),0);
  const cobFiado     = filtradas.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
  const cobSaldos    = filtradas.reduce((a,v)=>{const e=(v.pagadoNum||0)-(v.neto||0);return a+(e>0?e:0);},0);
  const porPago      = {contado:cobEfectivo, transferencia:cobTrans, fiado:cobFiado};
  const cantidades   = {};
  productos.forEach(p=>{cantidades[p.nombre]=0;});
  filtradas.forEach(v=>v.detalle.forEach(d=>{cantidades[d.nombre]=(cantidades[d.nombre]||0)+d.cantidad;}));
  const conDeuda     = clientes.filter(c=>c.saldo<0);
  const conFavor     = clientes.filter(c=>c.saldo>0);

  // ── Agrupación por mes (para vista anual e histórico) ─────────────────────
  const porMes = {};
  ventas.forEach(v=>{
    const fk = (v.fechaKey||v.fecha||"").slice(0,7);
    if(!fk) return;
    const anio = fk.slice(0,4);
    if(filtro==="anio" && anio!==mesSel.slice(0,4)) return;
    if(!porMes[fk]) porMes[fk]={mes:fk,total:0,efectivo:0,trans:0,fiado:0,ganancia:0,ventas:0};
    porMes[fk].total    += v.neto||0;
    porMes[fk].efectivo += v.pago==="contado"?v.neto||0:0;
    porMes[fk].trans    += v.pago==="transferencia"?v.neto||0:0;
    porMes[fk].fiado    += v.pago==="fiado"?v.neto||0:0;
    porMes[fk].ganancia += v.ganancia||0;
    porMes[fk].ventas   += 1;
  });
  const mesesOrdenados = Object.values(porMes).sort((a,b)=>a.mes.localeCompare(b.mes));
  const ultimosMeses   = mesesOrdenados.slice(-12);

  // ── Chart.js ──────────────────────────────────────────────────────────────
  const CC = {blue:"#5daaff",green:"#4dd9a0",amber:"#f5b942",red:"#f07070",gray:"#4a6a85",grid:"rgba(255,255,255,0.07)",text:"#7a9ab8"};

  React.useEffect(()=>{
    if(typeof Chart==="undefined") return;
    Object.values(chartInst.current).forEach(c=>c?.destroy());
    chartInst.current={};

    // Bar — ventas por mes
    if(chartRefs.bar.current && ultimosMeses.length>0){
      chartInst.current.bar = new Chart(chartRefs.bar.current,{
        type:"bar",
        data:{
          labels: ultimosMeses.map(m=>{const [y,mo]=m.mes.split("-");return `${mo}/${y.slice(2)}`;}),
          datasets:[
            {label:"Efectivo", data:ultimosMeses.map(m=>m.efectivo), backgroundColor:"#185FA5", borderRadius:4, borderSkipped:false},
            {label:"Transfer.", data:ultimosMeses.map(m=>m.trans),   backgroundColor:"#5daaff", borderRadius:4, borderSkipped:false},
            {label:"Fiado",    data:ultimosMeses.map(m=>m.fiado),    backgroundColor:"#f5b942", borderRadius:4, borderSkipped:false},
          ]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:CC.text,padding:8,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: $${Math.round(c.raw).toLocaleString("es-AR")}`}}},scales:{x:{stacked:true,grid:{color:CC.grid},ticks:{color:CC.text,font:{size:10}}},y:{stacked:true,grid:{color:CC.grid},ticks:{color:CC.text,callback:v=>`$${(v/1000).toFixed(0)}k`}}}}
      });
    }

    // Donut — forma de pago
    if(chartRefs.donut.current && totalNeto>0){
      const labels=["Efectivo","Transferencia","Fiado"];
      const vals=[cobEfectivo,cobTrans,cobFiado];
      chartInst.current.donut = new Chart(chartRefs.donut.current,{
        type:"doughnut",
        data:{labels,datasets:[{data:vals,backgroundColor:[CC.blue,"#3a7fd4",CC.amber],borderWidth:0,hoverOffset:6}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{position:"bottom",labels:{color:CC.text,padding:10,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.label}: $${Math.round(c.raw).toLocaleString("es-AR")}`}}}}
      });
    }

    // Line — evolución ganancia por mes
    if(chartRefs.line.current && ultimosMeses.length>1){
      chartInst.current.line = new Chart(chartRefs.line.current,{
        type:"line",
        data:{
          labels:ultimosMeses.map(m=>{const [y,mo]=m.mes.split("-");return `${mo}/${y.slice(2)}`;}),
          datasets:[{label:"Ganancia",data:ultimosMeses.map(m=>m.ganancia),borderColor:CC.green,backgroundColor:"rgba(77,217,160,0.08)",pointBackgroundColor:CC.green,pointRadius:4,borderWidth:2,tension:0.3,fill:true}]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${Math.round(c.raw).toLocaleString("es-AR")}`}}},scales:{x:{grid:{color:CC.grid},ticks:{color:CC.text,font:{size:10}}},y:{grid:{color:CC.grid},ticks:{color:CC.text,callback:v=>`$${(v/1000).toFixed(0)}k`}}}}
      });
    }
    return ()=>{Object.values(chartInst.current).forEach(c=>c?.destroy());};
  },[filtro,mesSel,diaSel,ventas]);

  // ── Render ────────────────────────────────────────────────────────────────
  const tituloFiltro = filtro==="mes"?`${mesSel.slice(5)}/${mesSel.slice(0,4)}`:filtro==="anio"?mesSel.slice(0,4):"Histórico completo";

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Resumen</span>
        <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={()=>{
          const total=filtradas.reduce((a,v)=>a+(v.neto||0),0);
          const texto=`*Resumen Reparto App · ${tituloFiltro}*\n\n💰 Efectivo: ${fmt(cobEfectivo)}\n📲 Transfer: ${fmt(cobTrans)}\n📝 Fiado: ${fmt(cobFiado)}\n📦 Total: ${fmt(total)}\n✅ Ganancia: ${fmt(totalGan)}\n\nEntregas: ${filtradas.length} clientes`;
          window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`,"_blank");
        }}>💬 WA</button>
      </div>

      {/* Selector de período */}
      <div style={{padding:"10px 14px 6px"}}>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {[["mes","Este mes"],["anio","Este año"],["todo","Histórico"],["dia","Por día"]].map(([v,l])=>(
            <button key={v} style={{...s.btn,fontSize:12,padding:"5px 12px",background:filtro===v?"#185FA5":"var(--color-background-tertiary)",color:filtro===v?"#e2eaf4":"var(--color-text-secondary)",border:filtro===v?"none":"0.5px solid var(--color-border-secondary)"}}
              onClick={()=>setFiltro(v)}>{l}</button>
          ))}
        </div>
        {(filtro==="mes"||filtro==="anio")&&(
          <input type="month" style={{...s.input,marginBottom:6}} value={mesSel}
            onChange={e=>setMesSel(e.target.value)} />
        )}
        {filtro==="dia"&&(
          <select style={{...s.select,marginBottom:6}} value={diaSel} onChange={e=>setDiaSel(e.target.value)}>

function exportarExcel(clientes,ventas,productos,planillas){

  XLSX.utils.book_append_sheet(wb,wsC,"Clientes");
  const fv=[];

  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(fv.length?fv:[{}]),"Ventas");
  const fp=[];
  Object.entries(planillas).forEach(([dia,p])=>fp.push({"Día":dia,Fecha:p.fecha||"",Peso:p.peso||"",Bultos:p.bultos||"","10L Llenos":p.productos?.b10?.llenos||0,"10L Vacíos":p.productos?.b10?.vacios||0,"10L Plata":p.productos?.b10?.plata||0,"10L Llenar":p.productos?.b10?.llenar||0,"20L Llenos":p.productos?.b20?.llenos||0,"20L Vacíos":p.productos?.b20?.vacios||0,"20L Plata":p.productos?.b20?.plata||0,"20L Llenar":p.productos?.b20?.llenar||0,"Soda Llenos":p.productos?.soda?.llenos||0,"Soda Vacíos":p.productos?.soda?.vacios||0,"Soda Plata":p.productos?.soda?.plata||0,"Soda Llenar":p.productos?.soda?.llenar||0,Efectivo:p.efectivo||0,Fiado:p.fiado||0,Retenciones:p.retenciones||0,Gastos:(p.gastos||[]).map(g=>`${g.cat}: $${g.monto}`).join(" | "),"Total Gastos":(p.gastos||[]).reduce((a,g)=>a+(Number(g.monto)||0),0),Obs:p.obs||""}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(fp.length?fp:[{}]),"Planillas");
  const fs=clientes.filter(c=>c.saldo!==0).map(c=>({Nombre:c.nombre,"Día":c.dia,Saldo:c.saldo,Estado:c.saldo<0?"Debe":"A favor"}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(fs.length?fs:[{}]),"Saldos");
  const fecha=new Date().toLocaleDateString("es-AR").replace(/\//g,"-");
  XLSX.writeFile(wb,`backup_reparto-app_${fecha}.xlsx`);
}

function importarBackup(file,setClientes,setVentas,setPlanillas){
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"array"});
      const csData=XLSX.utils.sheet_to_json(wb.Sheets["Clientes"]||{});
      if(csData.length) setClientes(csData.map(r=>({id:r.ID,nombre:r.Nombre||"",dia:r["Día"]||"Lunes",barrio:r.Barrio||"",manzana:r.Manzana||"",lote:r.Lote||"",telefono:String(r["Teléfono"]||""),maps:r.Maps||"",sifon:Number(r["Sifón"]||0),bidon10:Number(r["Bidón 10L"]||0),bidon20:Number(r["Bidón 20L"]||0),saldo:Number(r.Saldo||0)})));
      const vsData=XLSX.utils.sheet_to_json(wb.Sheets["Ventas"]||{});
      if(vsData.length){const vm={};vsData.forEach(r=>{if(!r.ID)return;if(!vm[r.ID])vm[r.ID]={id:r.ID,fecha:r.Fecha||"",dia:r["Día"]||"",cliente:r.Cliente||"",clienteId:null,pago:r["Forma Pago"]||"contado",bruto:Number(r.Bruto||0),desc:Number(r.Descuento||0),neto:Number(r.Neto||0),costo:Number(r.Costo||0),ganancia:Number(r.Ganancia||0),pagadoNum:Number(r.Pagado||0),saldoDelta:0,saldoAplicado:Number(r["Saldo Aplic"]||0),obs:r.Obs||"",detalle:[],envPrest:[],envDev:[]};vm[r.ID].detalle.push({nombre:r.Producto||"",cantidad:Number(r.Cantidad||0),precio:Number(r["Precio Unit"]||0),total:Number(r["Total Prod"]||0)});});setVentas(Object.values(vm));}
      const psData=XLSX.utils.sheet_to_json(wb.Sheets["Planillas"]||{});
      if(psData.length){const pm={};psData.forEach(r=>{if(!r["Día"])return;pm[r["Día"]]={fecha:r.Fecha||"",peso:r.Peso||"",bultos:r.Bultos||"",efectivo:r.Efectivo||"",fiado:r.Fiado||"",retenciones:r.Retenciones||"",obs:r.Obs||"",gastos:[],productos:{b10:{llenos:r["10L Llenos"]||"",vacios:r["10L Vacíos"]||"",plata:r["10L Plata"]||"",llenar:r["10L Llenar"]||""},b20:{llenos:r["20L Llenos"]||"",vacios:r["20L Vacíos"]||"",plata:r["20L Plata"]||"",llenar:r["20L Llenar"]||""},soda:{llenos:r["Soda Llenos"]||"",vacios:r["Soda Vacíos"]||"",plata:r["Soda Plata"]||"",llenar:r["Soda Llenar"]||""}}};});setPlanillas(pm);}
      alert("✅ Backup importado correctamente");
    }catch(err){alert("Error al importar: "+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function CalculadoraCostoReal({productos,ventas}) {
  const [gastoTraslado, setGastoTraslado] = React.useState("");
  const [envsXDia, setEnvsXDia] = React.useState("");
  const gastoNum = Number(gastoTraslado)||0;
  const envsNum  = Number(envsXDia)||0;
  const costoXEnvase = envsNum>0 && gastoNum>0 ? Math.round(gastoNum/envsNum) : 0;
  return (
    <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-tertiary)",borderLeft:"3px solid #5daaff"}}>
      <div style={{fontSize:13,fontWeight:600,color:"var(--color-text-info)",marginBottom:8}}>🧮 Calculadora de costo real puesto en cliente</div>
      <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:10,lineHeight:1.5}}>Calculá la ganancia real por artículo sumando el gasto de traslado.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div>
          <label style={s.label}>Gasto de traslado por día $</label>
          <input style={s.inputNum} type="number" placeholder="Ej: 5000" value={gastoTraslado} onChange={e=>setGastoTraslado(e.target.value)} />
          <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:2}}>GNC, nafta, propina, etc.</div>
        </div>
        <div>
          <label style={s.label}>Envases entregados ese día</label>
          <input style={s.inputNum} type="number" placeholder="Ej: 80" value={envsXDia} onChange={e=>setEnvsXDia(e.target.value)} />
          <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:2}}>Promedio de entregas por día</div>
        </div>
      </div>
      {costoXEnvase>0&&(
        <div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:10}}>
          <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:8}}>Traslado por unidad: <b style={{color:"var(--color-text-info)"}}>{fmt(costoXEnvase)}</b></div>
          {productos.map(p=>{
            const costoReal   = (p.costo||0) + costoXEnvase;
            const gananciaReal= (p.precio||0) - costoReal;
            const margenReal  = p.precio>0?Math.round((gananciaReal/p.precio)*100):0;
            return (
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                <span style={{fontSize:13,color:"var(--color-text-primary)"}}>{p.nombre}</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>Costo real: {fmt(costoReal)}</div>
                  <div style={{fontSize:13,fontWeight:600,color:gananciaReal>0?"var(--color-text-success)":"var(--color-text-danger)"}}>
                    {fmt(gananciaReal)} ({margenReal}%)
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Panel de gestión de repartidores (tab Equipo en Config) ──
function RepartidoresPanel({syncData}) {
  const [repartidores, setRepartidores] = React.useState(()=>{
    try{return JSON.parse(localStorage.getItem("cat_repartidores_v1")||"[]");}catch{return [];}
  });
  const [modo, setModo] = React.useState("lista"); // "lista" | "nuevo" | "editar"
  const [editando, setEditando] = React.useState(null);
  const [form, setForm] = React.useState({nombre:"",dia:"Martes",codigo:""});
  const [msg, setMsg] = React.useState("");

  const generarCodigo = () => {
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    return Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  };

  const guardar = () => {
    if(!form.nombre.trim()||!form.codigo.trim()){setMsg("Completá nombre y código");return;}
    const codUpper = form.codigo.trim().toUpperCase();
    const duplicado = repartidores.some(r=>r.codigo===codUpper&&r.id!==editando?.id);
    if(duplicado){setMsg("Ese código ya existe, usá otro");return;}
    let nueva;
    if(editando) {
      nueva = repartidores.map(r=>r.id===editando.id?{...r,...form,codigo:codUpper}:r);
    } else {
      nueva = [...repartidores,{id:Date.now(),nombre:form.nombre.trim(),dia:form.dia,codigo:codUpper}];
    }
    setRepartidores(nueva);
    localStorage.setItem("cat_repartidores_v1",JSON.stringify(nueva));
    if(syncData) syncData({repartidores:nueva});
    setModo("lista"); setEditando(null); setForm({nombre:"",dia:"Martes",codigo:""}); setMsg("");
  };

  const eliminar = (id) => {
    if(!window.confirm("¿Eliminar este repartidor?")) return;
    const nueva = repartidores.filter(r=>r.id!==id);
    setRepartidores(nueva);
    localStorage.setItem("cat_repartidores_v1",JSON.stringify(nueva));
    if(syncData) syncData({repartidores:nueva});
  };

  return (
    <div style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--color-text-primary)"}}>👥 Repartidores ({repartidores.length})</div>
        {modo==="lista"&&<button style={{...s.btn,padding:"6px 14px",fontSize:13}} onClick={()=>{setForm({nombre:"",dia:"Martes",codigo:generarCodigo()});setModo("nuevo");}}>+ Nuevo</button>}
      </div>

      {(modo==="nuevo"||modo==="editar")&&(
        <div style={{...s.card,marginBottom:14,borderLeft:"3px solid var(--color-accent)"}}>
          <div style={{fontSize:14,fontWeight:600,color:"var(--color-text-primary)",marginBottom:12}}>{modo==="nuevo"?"Nuevo repartidor":"Editar repartidor"}</div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:"var(--color-text-tertiary)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Nombre *</label>
            <input style={{...s.input,marginTop:4}} placeholder="Nombre del repartidor" value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} />
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:"var(--color-text-tertiary)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Día asignado</label>
            <select style={{...s.input,marginTop:4}} value={form.dia} onChange={e=>setForm(f=>({...f,dia:e.target.value}))}>
              {DIAS.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,color:"var(--color-text-tertiary)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Código de acceso *</label>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <input style={{...s.input,fontFamily:"monospace",fontSize:18,fontWeight:700,letterSpacing:"0.15em",flex:1}}
                placeholder="XXXX" maxLength={6} value={form.codigo}
                onChange={e=>setForm(f=>({...f,codigo:e.target.value.toUpperCase()}))} />
              <button style={{...s.btn,padding:"8px 12px",fontSize:12,whiteSpace:"nowrap"}} onClick={()=>setForm(f=>({...f,codigo:generarCodigo()}))}>🎲 Generar</button>
            </div>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:4}}>El repartidor usa este código para entrar a la app</div>
          </div>
          {msg&&<div style={{fontSize:13,color:"var(--color-text-danger)",marginBottom:10}}>{msg}</div>}
          <div style={{display:"flex",gap:8}}>
            <button style={{...s.btn,flex:1,fontSize:13}} onClick={()=>{setModo("lista");setEditando(null);setMsg("");}}>Cancelar</button>
            <button style={{...s.btn,flex:2,fontSize:13,background:"var(--color-accent)",color:"white"}} onClick={guardar}>

        </div>
      )}

      {repartidores.length===0&&modo==="lista"&&(
        <div style={{textAlign:"center",padding:"30px 0",color:"var(--color-text-tertiary)",fontSize:14}}>
          No hay repartidores todavía.<br/>Tocá "+ Nuevo" para agregar uno.
        </div>

        <div key={r.id} style={{...s.card,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:"var(--color-text-primary)"}}>{r.nombre}</div>
            <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>📅 {r.dia} · Código: <span style={{fontFamily:"monospace",fontWeight:700,color:"var(--color-text-primary)",letterSpacing:"0.1em"}}>{r.codigo}</span></div>

          </div>
        </div>
      ))}
    </div>
  );

function EnviarResumenEC({ecToken, ventas}) {
  const [enviando, setEnviando] = React.useState(false);
  const [ultimaSync, setUltimaSync] = React.useState(()=>localStorage.getItem('sm_ec_ultima')||'');
  const db = window.db;

  const enviarResumen = async () => {
    if(!ecToken||!db){ alert('Error: verificá la conexión'); return; }
    setEnviando(true);
    try {
      const hoy = new Date().toLocaleDateString('es-AR');
      const ventasHoy = (ventas||[]).filter(v=>v.fecha===hoy);
      const gastos = JSON.parse(localStorage.getItem('lc_gastos')||'[]');
      const gastosHoy = gastos.filter(g=>g.fecha===hoy);
      const totalVentas = ventasHoy.reduce((s,v)=>s+(v.total||0),0);
      const totalGastos = gastosHoy.reduce((s,g)=>s+(g.monto||0),0);
      const movs = [
        ...ventasHoy.map(v=>({id:'venta_'+v.id,tipo:'ingreso',monto:v.total||0,descripcion:'Venta reparto: '+(v.cliente||''),fecha:hoy,origen:'reparto_multi'})),
        ...gastosHoy.map(g=>({id:'gasto_'+g.id,tipo:'egreso',monto:g.monto||0,descripcion:'Gasto reparto: '+(g.concepto||''),fecha:hoy,origen:'reparto_multi'}))
      ];
      if(!movs.length){ alert('No hay movimientos para enviar hoy'); setEnviando(false); return; }
      const batch = db.batch();
      movs.forEach(m=>{
        const ref = db.collection('sinc_reparto').doc(ecToken).collection('movimientos').doc(m.id);
        batch.set(ref, m);
      });
      await batch.commit();
      const ahora = new Date().toLocaleString('es-AR');
      setUltimaSync(ahora);
      localStorage.setItem('sm_ec_ultima', ahora);
      alert('✅ Resumen enviado!\nVentas: $'+totalVentas.toLocaleString('es-AR')+'\nGastos: $'+totalGastos.toLocaleString('es-AR'));
    } catch(e){ alert('Error al enviar: '+e.message); }
    setEnviando(false);
  };

  return (
    <div style={{background:'var(--color-background-secondary)',borderRadius:12,padding:14,border:'0.5px solid var(--color-border-tertiary)',marginTop:12}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--color-text-secondary)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>📤 Enviar resumen del día</div>
      <button
        onClick={enviarResumen}
        disabled={enviando}
        style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:'var(--color-accent)',color:'white',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:8}}>
        {enviando?'⏳ Enviando...':'📤 Enviar resumen a Emma Control'}
      </button>
      {ultimaSync&&<div style={{fontSize:11,color:'var(--color-text-secondary)',textAlign:'center'}}>Última sincronización: {ultimaSync}</div>}
    </div>
  );
}

// ============ SISTEMA DE LICENCIAS MULTI ============
function PantallaActivacionMulti({onActivado, onRepartidor, verificarRepartidor}) {
  const [codigo, setCodigo] = React.useState(localStorage.getItem("sm_codigo")||"");
  const [paso, setPaso] = React.useState(localStorage.getItem("sm_codigo") ? "datos" : "codigo");
  const [nombre, setNombre] = React.useState("");
  const [celular, setCelular] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [pin, setPin] = React.useState("");
  const [error, setError] = React.useState("");
  const [cargando, setCargando] = React.useState(false);

  async function verificarCodigo() {
    if(!codigo.trim()) { setError("Ingresá el código de activación"); return; }
    setCargando(true); setError("");
    // Primero verificar si es código de repartidor (local)
    if(verificarRepartidor) {
      const rep = verificarRepartidor(codigo.trim());
      if(rep) { setCargando(false); onRepartidor&&onRepartidor(rep); return; }
    }
    // Si no, verificar licencia de dueño en Firebase
    try {
      const doc = await window.db.collection("licencias").doc(codigo.trim().toUpperCase()).get();
      if(!doc.exists) { setError("Código inválido. Verificá que esté bien escrito."); setCargando(false); return; }
      const data = doc.data();
      if(data.estado === "inactivo") { setError("Esta licencia está desactivada. Contactá a Emma Soluciones."); setCargando(false); return; }
      if(data.deviceId && data.deviceId !== getDeviceIdMulti()) { setError("Este código ya fue usado en otro dispositivo."); setCargando(false); return; }
      if(data.estado === "usado" && data.deviceId === getDeviceIdMulti()) {
        // Ya activado en este dispositivo, pedir PIN
        localStorage.setItem("sm_codigo", codigo.trim().toUpperCase());
        localStorage.setItem("sm_pin", String(data.pin));
        onActivado(data.pin);
        return;
      }
      localStorage.setItem("sm_codigo", codigo.trim().toUpperCase());
      setPaso("datos");
    } catch(e) { setError("Error de conexión. Verificá tu internet."); }
    setCargando(false);
  }

  async function activarApp() {
    if(!nombre||!celular||!email||!pin) { setError("Completá todos los campos"); return; }
    setCargando(true); setError("");
    try {
      const cod = codigo.trim().toUpperCase();
      await window.db.collection("licencias").doc(cod).update({
        negocio: nombre, celular, email,
        deviceId: getDeviceIdMulti(),
        estado: "usado", activadoEn: new Date().toISOString()
      });
      localStorage.setItem("sm_codigo", cod);
      localStorage.setItem("sm_pin", pin);
      onActivado(Number(pin));
    } catch(e) { setError("Error al activar. Intentá de nuevo."); }
    setCargando(false);
  }

  const s = {
    wrap:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-background-primary,#0f1923)",padding:20},
    card:{background:"var(--color-background-secondary,#1a2535)",borderRadius:20,padding:32,width:"100%",maxWidth:380,textAlign:"center"},
    ico:{fontSize:48,marginBottom:12},
    h1:{fontSize:20,fontWeight:800,color:"var(--color-text-primary,#e2eaf4)",marginBottom:6},
    sub:{fontSize:14,color:"var(--color-text-secondary,#7a8a9a)",marginBottom:24},
    inp:{width:"100%",padding:"12px 16px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"var(--color-text-primary,#e2eaf4)",fontSize:15,outline:"none",marginBottom:10,boxSizing:"border-box"},
    btn:{width:"100%",padding:14,borderRadius:50,border:"none",background:"#7c3aed",color:"white",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:6},
    err:{color:"#f87171",fontSize:13,marginTop:8}
  };

  return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.ico}>🚚</div>
        <div style={s.h1}>Sistema de Reparto Multi</div>
        <div style={s.sub}>{paso==="codigo" ? "Primera vez aquí. Ingresá el código de activación que recibiste." : "Completá tus datos para activar la app."}</div>
        {paso === "codigo" ? <>
          <input style={s.inp} placeholder="Código de activación" value={codigo} onChange={e=>setCodigo(e.target.value.toUpperCase())} />
          <button style={s.btn} onClick={verificarCodigo} disabled={cargando}>{cargando?"Verificando...":"Continuar →"}</button>
        </> : <>
          <input style={s.inp} placeholder="Nombre del negocio *" value={nombre} onChange={e=>setNombre(e.target.value)} />
          <input style={s.inp} placeholder="Número de celular *" value={celular} onChange={e=>setCelular(e.target.value)} type="tel" />
          <input style={s.inp} placeholder="Email *" value={email} onChange={e=>setEmail(e.target.value)} type="email" />
          <input style={s.inp} placeholder="PIN de acceso (lo recibiste con el código) *" value={pin} onChange={e=>setPin(e.target.value)} type="number" />
          <button style={s.btn} onClick={activarApp} disabled={cargando}>{cargando?"Activando...":"Activar app →"}</button>
        </>}
        {error && <div style={s.err}>{error}</div>}
        <p style={{fontSize:11,color:"#4a5568",marginTop:16}}>Emma Soluciones Digitales · 3813399962</p>
      </div>
    </div>
  );
}

function PantallaPINMulti({pinCorrecto, onOk}) {
  const [pin, setPin] = React.useState("");

    const nuevo = pin + d;
    setPin(nuevo);
    if(nuevo.length === 4) {

      else { setIntentos(i=>i-1); setPin(""); }

  const s = {
    wrap:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-background-primary,#0f1923)",flexDirection:"column",gap:16},

    dots:{display:"flex",gap:14,margin:"12px 0"},
    dot:{width:14,height:14,borderRadius:"50%",border:"2px solid #7c3aed"},
    dotFill:{width:14,height:14,borderRadius:"50%",background:"#7c3aed"},
    grid:{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:10},
    key:{width:72,height:72,borderRadius:16,border:"1.5px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"var(--color-text-primary,#e2eaf4)",fontSize:24,fontWeight:700,cursor:"pointer"},
    err:{color:"#f87171",fontSize:13}
  };
  return (
    <div style={s.wrap}>
      <div style={s.h1}>Sistema de Reparto Multi</div>
      <div style={s.sub}>Ingresá tu PIN de acceso</div>
      <div style={s.dots}>{[0,1,2,3].map(i=><div key={i} style={pin.length>i?s.dotFill:s.dot}/>)}</div>
      {intentos < 4 && <div style={s.err}>PIN incorrecto ({intentos} intentos restantes)</div>}
      <div style={s.grid}>
        {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={s.key} onClick={()=>verificar(String(d))}>{d}</button>)}
        <div/><button style={s.key} onClick={()=>verificar("0")}>0</button>
        <button style={{...s.key,fontSize:18}} onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
      </div>
    </div>
  );
}

function getDeviceIdMulti() {
  let id = localStorage.getItem("sm_device_id");
  if(!id) { id = "dev_"+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2); localStorage.setItem("sm_device_id", id); }
  return id;
}
